
<html>
<head>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body style="margin:0;background:black;overflow:hidden;color:#00ff00;font-family:monospace;">
<div id="hud" style="position:absolute;top:20px;left:20px;z-index:99;background:rgba(0,0,0,0.7);padding:15px;border:1px solid #00ff00;box-shadow: 0 0 10px #00ff00;max-width:300px;">
    <h2>MITOPULSE V73</h2>
    <hr style="border-color:#00ff00;">
    <p>Loading Neural Telemetry...</p>
</div>
<script>
let scene = new THREE.Scene();
let camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
let renderer = new THREE.WebGLRenderer();
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

let geometry = new THREE.SphereGeometry(0.2, 16, 16);
let material = new THREE.MeshBasicMaterial({color:0x00ff00});

let nodes = [];
for(let i=0;i<20;i++){
    let sphere = new THREE.Mesh(geometry, material);
    sphere.position.x = (Math.random()-0.5)*5;
    sphere.position.y = (Math.random()-0.5)*5;
    scene.add(sphere);
    nodes.push(sphere);
}

camera.position.z = 5;

async function update(){
    let res = await fetch("/stream");
    let data = await res.json();
    
    // Change node color based on Structural Risk
    let rColor = new THREE.Color(data.risk > 0.65 ? 0xff0000 : (data.trust > 0.8 ? 0x00ffff : 0x00ff00));
    material.color.lerp(rColor, 0.1);
    
    // Update the Cybernetic HUD
    let hud = document.getElementById("hud");
    hud.innerHTML = `
        <h2>MITOPULSE V73</h2>
        <div style="font-size:12px;color:#aaa;">GOD MODE ORCHESTRATOR</div>
        <hr style="border-color:${data.risk > 0.65 ? 'red' : '#00ff00'};">
        <b>MARKET PULSE:</b> ${data.signal}<br>
        <b>STRUCTURAL RISK:</b> ${(data.risk * 100).toFixed(2)}%<br>
        <b>BASE TRUST:</b> ${(data.trust * 100).toFixed(2)}%<br>
        <b>QUORUM:</b> ${data.protocol_quorum ? '<span style="color:#00ff00">APPROVED</span>' : '<span style="color:red">REJECTED</span>'}<br>
        <b>DECISION:</b> ${data.action}
    `;
    hud.style.borderColor = data.risk > 0.65 ? 'red' : '#00ff00';
    hud.style.boxShadow = `0 0 10px ${data.risk > 0.65 ? 'red' : '#00ff00'}`;
    hud.style.color = data.risk > 0.65 ? '#ff4444' : '#00ff00';

    nodes.forEach((n,i)=>{
        // Animate positions using the native mathematical nodes if provided, else organic noise
        let t_node = data.nodes ? data.nodes[i % data.nodes.length] : 0.05;
        n.position.x += (Math.random()-0.5) * (data.risk * 0.15 + t_node*0.1);
        n.position.y += (Math.random()-0.5) * (data.risk * 0.15 + t_node*0.1);
        n.position.z += (Math.random()-0.5) * 0.02;
    });
}

function animate(){
    requestAnimationFrame(animate);
    renderer.render(scene, camera);
}
// 1000ms loop for live streaming
setInterval(update, 1000);
animate();
</script>
</body>
</html>
