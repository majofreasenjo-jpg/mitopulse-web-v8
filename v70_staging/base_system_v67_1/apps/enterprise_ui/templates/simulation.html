{% extends "base.html" %}
{% block content %}
<section class="hero"><h1>Simulation</h1><p>Vista conceptual para ejecutar escenarios before-action.</p></section>
<section class="card">
  <h3>Scenario Playback</h3>
  <table>
    <tr><th>Stage</th><th>SCR Proxy</th></tr>
    {% for r in timeline %}
    <tr><td>{{r.stage}}</td><td>{{r.stage_scr}}</td></tr>
    {% endfor %}
  </table>
  <button class="btn" onclick="alert('Scenario executed (stub)')">Run Scenario</button>
</section>
{% endblock %}
