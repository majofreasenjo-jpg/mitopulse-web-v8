{% extends "base.html" %}
{% block content %}
<section class="hero"><h1>Workflow & Actions</h1><p>Actions, approvals y gobernanza operativa.</p></section>
<section class="card">
  <div style="margin-bottom:12px">
    <select id="caseId">
      {% for c in cases %}
      <option value="{{c.id}}">{{c.id}} - {{c.title}}</option>
      {% endfor %}
    </select>
    <select id="actionType">
      <option value="monitor">monitor</option>
      <option value="escalate">escalate</option>
      <option value="restrict">restrict</option>
      <option value="block">block</option>
      <option value="simulate">simulate</option>
    </select>
    <button class="btn" onclick="createAction()">Create Action</button>
  </div>
  <table>
    <tr><th>ID</th><th>Case</th><th>Type</th><th>Approved</th><th>Approve</th></tr>
    {% for a in actions %}
    <tr>
      <td>{{a.id}}</td><td>{{a.case_id}}</td><td>{{a.action_type}}</td><td>{{a.approved}}</td>
      <td>{% if not a.approved %}<button class="btn" onclick="approveAction('{{a.id}}')">Approve</button>{% endif %}</td>
    </tr>
    {% endfor %}
  </table>
</section>
<script>
function createAction(){
  fetch('/api/actions', {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({
      case_id: document.getElementById('caseId').value,
      action_type: document.getElementById('actionType').value
    })
  }).then(()=>location.reload());
}
function approveAction(id){
  fetch('/api/actions/'+id+'/approve', {method:'POST'}).then(()=>location.reload());
}
</script>
{% endblock %}
