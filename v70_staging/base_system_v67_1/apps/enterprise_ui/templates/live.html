{% extends "base.html" %}
{% block content %}
<section class="hero"><h1>Live Graph</h1><p>Vista viva del grafo relacional.</p></section>
<section class="card">
  <canvas id="graphCanvas" width="980" height="480"></canvas>
</section>
<script>
fetch('/api/graph').then(r=>r.json()).then(g=>{
  const c = document.getElementById('graphCanvas');
  const ctx = c.getContext('2d');
  ctx.clearRect(0,0,c.width,c.height);
  g.links.forEach(l=>{
    const a=g.nodes.find(n=>n.id===l.s);
    const b=g.nodes.find(n=>n.id===l.t);
    if(!a||!b) return;
    ctx.beginPath(); ctx.moveTo(a.x,a.y); ctx.lineTo(b.x,b.y);
    ctx.strokeStyle='#2d376d'; ctx.stroke();
  });
  g.nodes.forEach(n=>{
    ctx.beginPath(); ctx.arc(n.x,n.y,5,0,Math.PI*2);
    ctx.fillStyle = n.risk>70 ? '#ff6b6b' : (n.risk>40 ? '#ffd166' : '#4cc9f0');
    ctx.fill();
  });
});
</script>
{% endblock %}
