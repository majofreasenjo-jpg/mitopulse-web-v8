<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>MitoPulse App v10.1</title>
<style>
body{font-family:Arial;background:#0f172a;color:#fff;margin:0}.wrap{max-width:980px;margin:auto;padding:20px}.card{background:#1e293b;border-radius:16px;padding:18px;margin-bottom:18px}.two{display:grid;grid-template-columns:1fr 1fr;gap:14px}@media (max-width:700px){.two{grid-template-columns:1fr}}button,input,select{padding:12px;border-radius:10px;border:none;margin:6px 0}button{background:#22c55e;color:#fff;cursor:pointer}label{display:block;margin-top:8px}input[type=range]{width:100%}.small{opacity:.84;font-size:14px}.mono{font-family:monospace;white-space:pre-wrap;background:#0b1220;padding:12px;border-radius:12px;max-height:380px;overflow:auto}
</style></head><body><div class="wrap">
<div class="card"><h1>MitoPulse App v10.1</h1><div id="live" class="small">Conectado</div><div id="nodeInfo" class="small"></div></div>
<div class="two"><div class="card"><h2>Identidad</h2><select id="userSelect"></select><select id="targetSelect"><option value="">Sin target</option></select><label>Escenario<select id="scenario"><option value="bank_transfer">bank_transfer</option><option value="pass_transfer">pass_transfer</option><option value="phone_scam">phone_scam</option><option value="whatsapp_identity">whatsapp_identity</option><option value="identity_spoof">identity_spoof</option><option value="marketplace_sale">marketplace_sale</option><option value="marketplace_fraud">marketplace_fraud</option><option value="wallet_sign">wallet_sign</option><option value="wallet_drain">wallet_drain</option></select></label></div>
<div class="card"><h2>Reputación externa</h2><label>Phone risk<input id="phone_risk" type="range" min="0" max="1" step="0.1" value="0"></label><label>Email leak risk<input id="email_leak_risk" type="range" min="0" max="1" step="0.1" value="0"></label><label>Wallet risk<input id="wallet_risk" type="range" min="0" max="1" step="0.1" value="0"></label><label>Domain risk<input id="domain_risk" type="range" min="0" max="1" step="0.1" value="0"></label></div></div>
<div class="card"><h2>Señales del evento</h2><label>Monto<input id="amount" type="range" min="0" max="2500" step="50" value="150"></label><label>Urgencia<input id="urgency" type="range" min="0" max="1" step="0.1" value="0.2"></label><label>Riesgo dictado<input id="dictation" type="range" min="0" max="1" step="0.1" value="0.0"></label><label>Ruptura rutina<input id="routine" type="range" min="0" max="1" step="0.1" value="0.2"></label><label>Solapamiento social<input id="social" type="range" min="0" max="1" step="0.1" value="0.6"></label><label>Alineación temporal<input id="temporal" type="range" min="0" max="1" step="0.1" value="0.6"></label><label>Contexto coherente<input id="context" type="range" min="0" max="1" step="0.1" value="0.6"></label><label>Coherencia interacción<input id="coherence" type="range" min="0" max="1" step="0.1" value="0.6"></label><label>Anomalía red<input id="net" type="range" min="0" max="1" step="0.1" value="0.0"></label><label>Novedad transacción<input id="novelty" type="range" min="0" max="1" step="0.1" value="0.2"></label><label>Captura remota probable<input id="remote" type="range" min="0" max="1" step="0.1" value="0.0"></label></div>
<div class="card"><button onclick="submitEval()">Evaluar evento</button><button onclick="crossPulse()">Pulso cruzado</button><div id="result" class="small"></div></div>
<div class="two"><div class="card"><h2>Desglose del cálculo</h2><div id="breakdown" class="mono">Sin evaluación todavía.</div></div><div class="card"><h2>Recibo de auditoría</h2><div id="auditBox" class="mono">Sin auditoría todavía.</div></div></div>
</div>
<script>
function getPersistentNodeId(){let id=localStorage.getItem('mitopulse_node_id'); if(!id){id='node_'+Math.random().toString(16).slice(2,10); localStorage.setItem('mitopulse_node_id',id);} return id;}
const nodeId=getPersistentNodeId(); document.getElementById('nodeInfo').textContent='Node ID persistente: '+nodeId;
let clickCount=0,keyCount=0,moveCount=0,startedAt=Date.now(),eventTimes=[];
document.addEventListener('click',()=>{clickCount++;eventTimes.push(Date.now())}); document.addEventListener('mousemove',()=>{moveCount++; if(moveCount%8===0)eventTimes.push(Date.now())}); document.addEventListener('keydown',()=>{keyCount++;eventTimes.push(Date.now())});
function entropy(ts){if(ts.length<3)return 0.2;const d=[];for(let i=1;i<ts.length;i++)d.push(ts[i]-ts[i-1]);const m=d.reduce((a,b)=>a+b,0)/d.length;const v=d.reduce((a,b)=>a+Math.pow(b-m,2),0)/d.length;return Math.min(1,v/50000)}
function hes(ts){if(ts.length<2)return 0.2;const d=[];for(let i=1;i<ts.length;i++)d.push(ts[i]-ts[i-1]);return Math.min(1,d.filter(x=>x>700).length/Math.max(1,d.length))}
async function registerNode(){await fetch('/api/register_node',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({node_id:nodeId,platform:'web'})});}
function payload(){return {user_id:userSelect.value,target_id:targetSelect.value||null,scenario:scenario.value,amount:parseFloat(amount.value),started_at:startedAt,click_count:clickCount,key_count:keyCount,move_count:moveCount,interaction_entropy:entropy(eventTimes),hesitation:hes(eventTimes),urgency:parseFloat(urgency.value),dictation_risk:parseFloat(dictation.value),routine_break:parseFloat(routine.value),social_overlap:parseFloat(social.value),temporal_alignment:parseFloat(temporal.value),context_fit:parseFloat(context.value),interaction_coherence:parseFloat(coherence.value),network_anomaly:parseFloat(net.value),transaction_novelty:parseFloat(novelty.value),remote_capture_probability:parseFloat(remote.value),phone_risk:parseFloat(phone_risk.value),email_leak_risk:parseFloat(email_leak_risk.value),wallet_risk:parseFloat(wallet_risk.value),domain_risk:parseFloat(domain_risk.value)};}
async function loadUsers(){const users=await fetch('/api/users').then(r=>r.json()); userSelect.innerHTML=''; targetSelect.innerHTML='<option value="">Sin target</option>'; users.forEach(u=>{let a=document.createElement('option');a.value=u.id;a.textContent=`${u.name}${u.role==='guardian'?' ⭐':''}`;userSelect.appendChild(a); let b=document.createElement('option');b.value=u.id;b.textContent=`${u.name}${u.role==='guardian'?' ⭐':''}`;targetSelect.appendChild(b);});}
async function loadAudit(id){const d=await fetch(`/api/evaluation/${id}/audit`).then(r=>r.json()); auditBox.textContent=JSON.stringify(d,null,2);}
async function submitEval(){const d=await fetch('/api/evaluate',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload())}).then(r=>r.json()); result.textContent=`${d.decision} | ${d.confidence_label} | Trust ${d.trust_score} | Shared ${d.shared_reality} | Hunter ${d.fraud_hunter_score}${d.guardian_alert?' | Guardian alert ON':''}`; breakdown.textContent=`RDS=${d.relational_distance_score}
ASS=${d.anchor_support_score}
SRS=${d.shared_reality}
SC=${d.situational_coherence}
FE=${d.fraud_exposure}
TrustScore=${d.trust_score}
Acción=${d.recommended_action}

Explicación:
- ${d.human_explanation.relational_distance_score}
- ${d.human_explanation.anchor_support_score}
- ${d.human_explanation.shared_reality}
- ${d.human_explanation.situational_coherence}
- ${d.human_explanation.fraud_exposure}`; if(d.evaluation_id){loadAudit(d.evaluation_id)} }
async function crossPulse(){const nodes=await fetch('/api/nodes').then(r=>r.json()); const other=nodes.find(n=>n.id!==nodeId); if(!other){result.textContent='No hay otro nodo'; return;} const d=await fetch('/api/crosspulse',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({node_a:nodeId,node_b:other.id,shared_context_score:80,temporal_delta_ms:30,source:'web_app'})}).then(r=>r.json()); result.textContent=d.ok?`Cross pulse ${d.node_a} ↔ ${d.node_b} | relación ${d.relationship_weight_before||'n/a'} -> ${d.relationship_weight_after||'n/a'}`:'Error';}
registerNode(); loadUsers();
</script></body></html>
