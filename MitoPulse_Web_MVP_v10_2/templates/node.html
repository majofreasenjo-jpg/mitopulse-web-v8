<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Nodo MitoPulse v10.2</title>
<style>
body{font-family:Arial;background:#000;color:#fff;margin:0}.wrap{max-width:820px;margin:auto;padding:24px}.status{text-align:center;font-size:32px;color:#6d6cff;letter-spacing:4px;margin-top:20px}.orb{width:240px;height:240px;border-radius:50%;margin:24px auto;background:radial-gradient(circle,#6d6cff 0%,#2d2d66 50%,#111 75%);display:flex;align-items:center;justify-content:center;font-size:32px;font-weight:bold;box-shadow:0 0 80px #4b4bcc}.card{background:rgba(30,41,59,.78);border-radius:24px;padding:20px;margin:18px 0}.muted{color:#94a3b8}.btn{display:block;width:100%;padding:16px;border-radius:18px;border:none;background:#6d6cff;color:#fff;font-size:18px;font-weight:bold;cursor:pointer}.btn.alt{background:#4f46e5}.btn.ghost{background:#334155}.mono{font-family:monospace;color:#10b981;white-space:pre-wrap}select,input{width:100%;padding:12px;border-radius:12px;border:none;margin:8px 0}.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}@media(max-width:780px){.grid{grid-template-columns:1fr}}.pill{display:inline-block;padding:4px 8px;border-radius:999px;background:#334155;font-size:12px}
</style></head><body><div class="wrap">
<div class="status">STATUS: ACTIVE</div><div class="orb">CONNECTED</div>
<div class="card"><div class="muted">IDENTIDAD NODAL PERSISTENTE</div><h1 id="nodeId">node_----</h1><div class="mono" id="log">> Registrando nodo...</div><div class="mono" id="pulseInfo" style="margin-top:10px;">> Pulsos: 0 | Cross Pulses: 0</div><div class="mono" id="metaInfo" style="margin-top:10px;">> Próximo latido en 30s</div><div style="margin-top:10px"><span class="pill" id="guardianFlag">guardian: no</span> <span class="pill" id="trustFlag">trust: 0</span> <span class="pill" id="massFlag">mass: 0</span></div></div>
<div class="grid">
<div class="card"><div class="muted">Cross-pulse directo</div><label class="muted">Nodo objetivo<select id="otherNode"><option value="">Cargando nodos...</option></select></label><button class="btn alt" onclick="emitCrossPulse()">CONECTAR CON NODO</button></div>
<div class="card"><div class="muted">Handshake MitoRelay (código corto)</div><button class="btn ghost" onclick="createHandshake()">GENERAR CÓDIGO</button><div class="mono" id="handshakeCode" style="margin-top:8px">> Sin código activo</div><input id="confirmCode" placeholder="Ingresa código de otro nodo"><button class="btn" onclick="confirmHandshake()">CONFIRMAR CÓDIGO</button></div>
</div>
<button class="btn" onclick="emitPulse()">EMITIR LATIDO</button>
</div>
<script>
function getPersistentNodeId(){let id=localStorage.getItem('mitopulse_node_id'); if(!id){id='node_'+Math.random().toString(16).slice(2,10); localStorage.setItem('mitopulse_node_id',id);} return id;}
const nodeId=getPersistentNodeId(); document.getElementById('nodeId').textContent=nodeId; let countdown=30;
async function registerNode(){const d=await fetch('/api/register_node',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({node_id:nodeId,platform:'mobile'})}).then(r=>r.json()); document.getElementById('log').textContent=`> Nodo persistente verificado\n> status: ${d.status||'active'}`; await refreshStatus(); await loadNodes();}
async function loadNodes(){const nodes=await (await fetch('/api/nodes')).json(); const sel=document.getElementById('otherNode'); sel.innerHTML='<option value="">Selecciona nodo...</option>'; nodes.filter(n=>n.id!==nodeId).forEach(n=>{const o=document.createElement('option'); o.value=n.id; o.textContent=`${n.id} | ${n.platform} | pulsos ${n.pulse_count} | trust ${n.trust_rank}`; sel.appendChild(o);});}
async function refreshStatus(){const r=await fetch(`/api/node_status/${nodeId}`); const d=await r.json(); if(d.error){document.getElementById('log').textContent='> Error de registro'; return;} document.getElementById('pulseInfo').textContent=`> Pulsos: ${d.pulse_count} | Cross Pulses: ${d.cross_pulse_count}`; document.getElementById('metaInfo').textContent=`> Último seen: ${d.last_seen_at} | Próximo latido en ${countdown}s`; document.getElementById('guardianFlag').textContent=`guardian: ${d.is_guardian?'sí':'no'}`; document.getElementById('trustFlag').textContent=`trust: ${d.trust_rank}`; document.getElementById('massFlag').textContent=`mass: ${d.nodal_mass}`;}
async function emitPulse(){const d=await fetch('/api/pulse',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({node_id:nodeId,platform:'mobile'})}).then(r=>r.json()); countdown=30; document.getElementById('log').textContent=`> Latido emitido\n> pulse_count: ${d.pulse_count}\n> last_seen: ${d.last_seen_at}\n> trust: ${d.trust_rank||'n/a'}`; await refreshStatus();}
async function emitCrossPulse(){const other=document.getElementById('otherNode').value; if(!other){document.getElementById('log').textContent='> Selecciona un nodo para validar'; return;} const d=await fetch('/api/crosspulse',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({node_a:nodeId,node_b:other,shared_context_score:82,temporal_delta_ms:35,source:'mobile_node'})}).then(r=>r.json()); await refreshStatus(); document.getElementById('log').textContent=`> Cross pulse con ${other}\n> score: ${d.shared_context_score}\n> relación: ${d.relationship_weight_before||'n/a'} -> ${d.relationship_weight_after||'n/a'}`;}
async function createHandshake(){const d=await fetch('/api/crosspulse/session/create',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({node_a:nodeId})}).then(r=>r.json()); document.getElementById('handshakeCode').textContent=`> Código activo: ${d.code}\n> expira en ${d.expires_in}s`; document.getElementById('log').textContent='> Handshake MitoRelay creado';}
async function confirmHandshake(){const code=(document.getElementById('confirmCode').value||'').trim(); if(!code){document.getElementById('log').textContent='> Ingresa un código válido'; return;} const res=await fetch('/api/crosspulse/session/confirm',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({code,node_b:nodeId})}); const d=await res.json(); if(!res.ok){document.getElementById('log').textContent=`> ${d.error||'Error al confirmar código'}`; return;} await refreshStatus(); document.getElementById('log').textContent=`> Handshake confirmado\n> con ${d.node_a}\n> relación: ${d.relationship_weight_before||'n/a'} -> ${d.relationship_weight_after||'n/a'}`;}
registerNode(); setInterval(()=>{countdown=Math.max(0,countdown-1); if(countdown%5===0) refreshStatus(); else document.getElementById('metaInfo').textContent=document.getElementById('metaInfo').textContent.replace(/\d+s$/,`${countdown}s`);},1000); setInterval(()=>emitPulse(),30000);
</script></body></html>
