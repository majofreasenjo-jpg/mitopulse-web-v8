<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MitoPulse v13.1 | Geospatial Consciousness Monitor</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;400;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <style>
        :root {
            --primary: #6366f1;
            --accent: #a855f7;
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.85);
            --text: #f8fafc;
            --danger: #ef4444;
            --success: #4ade80;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            background-image: url('consciousness_dashboard_bg.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, transparent 0%, rgba(15, 23, 42, 0.9) 100%);
            z-index: -1;
        }

        header {
            width: 100%;
            padding: 1.5rem;
            text-align: center;
            backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            margin: 0;
            letter-spacing: 4px;
            background: linear-gradient(to right, var(--primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 2rem;
        }

        .container {
            max-width: 1400px;
            width: 95%;
            padding: 2rem 0;
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 2rem;
        }

        #map {
            height: 600px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            background: #111;
        }

        .side-panel {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 1.5rem;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .card h2 {
            font-family: 'Orbitron', sans-serif;
            font-size: 1rem;
            margin: 0;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .value {
            font-size: 2.5rem;
            font-weight: 700;
            margin: 0.5rem 0;
            font-family: 'Orbitron', sans-serif;
        }

        .region-badge {
            display: inline-block;
            padding: 0.3rem 1rem;
            border-radius: 6px;
            background: var(--primary);
            font-size: 0.75rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }

        .logs {
            grid-column: 1 / -1;
            max-height: 150px;
            overflow-y: auto;
            background: rgba(0, 0, 0, 0.4);
            font-family: 'Courier New', monospace;
            padding: 1rem;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            font-size: 0.8rem;
        }

        .log-entry {
            margin-bottom: 0.3rem;
            border-left: 2px solid var(--primary);
            padding-left: 1rem;
        }

        .controls {
            grid-column: 1 / -1;
            display: flex;
            justify-content: center;
            gap: 2rem;
            margin-top: 1rem;
        }

        .btn {
            font-family: 'Orbitron', sans-serif;
            padding: 1rem 2rem;
            border-radius: 12px;
            border: none;
            cursor: pointer;
            font-weight: 700;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 2px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-danger {
            background: var(--danger);
            color: white;
        }

        .btn:hover {
            transform: translateY(-3px);
            filter: brightness(1.2);
            box-shadow: 0 8px 30px rgba(99, 102, 241, 0.4);
        }

        /* Leaflet Dark Styles */
        .leaflet-container {
            background: #0f172a !important;
        }

        .leaflet-tile {
            filter: brightness(0.6) invert(1) contrast(3) hue-rotate(200deg) saturate(0.3);
        }

        .leaflet-popup-content-wrapper {
            background: var(--bg);
            color: white;
            border: 1px solid var(--primary);
        }

        .leaflet-popup-tip {
            background: var(--primary);
        }
    </style>
</head>

<body>
    <div class="overlay"></div>
    <header>
        <h1>MITOPULSE V13.1</h1>
        <div style="font-size: 0.8rem; color: var(--success); text-transform: uppercase; margin-top: 0.5rem;">Geospatial
            Consciousness Active</div>
    </header>

    <div class="container">
        <!-- MAP SECTION -->
        <div id="map"></div>

        <!-- STATS SECTION -->
        <div class="side-panel">
            <div class="card" id="region-card">
                <div class="region-badge" id="current-region">Global Baseline</div>
                <h2>Network State</h2>
                <div class="value" id="consc-status" style="color: var(--success)">STABLE</div>
                <div class="sub-text" id="consc-desc" style="color: #94a3b8">Patterns within baseline.</div>
            </div>

            <div class="card">
                <h2>Presence Engine</h2>
                <div class="value" id="presence-count">1,275</div>
                <div class="sub-text" style="color: #94a3b8">Active Regional Nodes</div>
            </div>

            <div class="card">
                <h2>Risk Vector</h2>
                <div class="value" id="risk-level" style="color: var(--accent)">LOW</div>
                <div class="sub-text" style="color: #94a3b8">Simulated Threat Ratio</div>
            </div>
        </div>

        <div class="controls">
            <button class="btn btn-primary" onclick="updateSignal()">Sync Signal</button>
            <button class="btn btn-danger" id="anomaly-btn" onclick="toggleAnomaly()">Simulate Anomaly</button>
        </div>

        <div class="logs" id="log-container">
            <div class="log-entry">[SYSTEM] Initializing Geospatial Consciousness Mesh...</div>
            <div class="log-entry">[MAP] Layering planetary coordinates...</div>
        </div>
    </div>

    <script>
        const presenceCount = document.getElementById('presence-count');
        const conscStatus = document.getElementById('consc-status');
        const conscDesc = document.getElementById('consc-desc');
        const riskLevel = document.getElementById('risk-level');
        const currentRegion = document.getElementById('current-region');
        const logContainer = document.getElementById('log-container');
        const anomalyBtn = document.getElementById('anomaly-btn');

        let anomalyActive = false;

        function addLog(msg) {
            const div = document.createElement('div');
            div.className = 'log-entry';
            div.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
            logContainer.prepend(div);
        }

        function toggleAnomaly() {
            anomalyActive = !anomalyActive;
            anomalyBtn.textContent = anomalyActive ? "Stop Anomaly" : "Simulate Anomaly";
            addLog(anomalyActive ? "[WARNING] Initiating network-wide trust drift simulation..." : "[SYSTEM] Ceasing anomaly simulation.");
            updateSignal(currentRegion.textContent === "Global Baseline" ? "Global" : currentRegion.textContent);
        }

        // Initialize Map with constraints
        const map = L.map('map', {
            center: [20, 0],
            zoom: 2,
            minZoom: 2,
            maxBounds: [[-90, -180], [90, 180]],
            worldCopyJump: true
        });

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 18,
            attribution: '© OpenStreetMap',
            noWrap: true,
            bounds: [[-90, -180], [90, 180]]
        }).addTo(map);

        const markers = [
            { name: "New York", coords: [40.7128, -74.0060] },
            { name: "London", coords: [51.5074, -0.1278] },
            { name: "Tokyo", coords: [35.6762, 139.6503] },
            { name: "São Paulo", coords: [-23.5505, -46.6333] },
            { name: "Sydney", coords: [-33.8688, 151.2093] }
        ];

        markers.forEach(loc => {
            const marker = L.circleMarker(loc.coords, {
                radius: 12,
                fillColor: loc.name === "Tokyo" ? "#ef4444" : "#6366f1", // Highlight Tokyo as known anomaly
                color: "#fff",
                weight: 3,
                opacity: 1,
                fillOpacity: 0.9
            }).addTo(map);

            marker.bindPopup(`<b>${loc.name} Node</b><br>Click to inspect perception.`);
            marker.on('click', () => updateSignal(loc.name));
        });

        async function updateSignal(region = "Global") {
            try {
                // Determine stability based on anomaly button state
                const baseStability = anomalyActive ? 0.35 : 0.9;

                // Using 127.0.0.1 explicitly to avoid IPv6/localhost resolution issues on Windows
                const response = await fetch('http://127.0.0.1:8080/v13/signal', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        user_id: "geo_observer_" + Math.floor(Math.random() * 100),
                        stability: baseStability,
                        human_conf: 0.99,
                        risk: anomalyActive ? 8 : 1,
                        region: region
                    })
                });

                if (!response.ok) throw new Error(`HTTP ${response.status}`);

                const result = await response.json();

                // Update UI
                currentRegion.textContent = result.region;
                presenceCount.textContent = result.presence.count.toLocaleString();
                riskLevel.textContent = result.risk.risk_level.toUpperCase();

                const state = result.collective_state.collective_state;
                conscStatus.textContent = state.toUpperCase().replace('_', ' ');

                if (state === 'stable') {
                    conscStatus.style.color = 'var(--success)';
                    conscDesc.textContent = "Patterns within regional baseline.";
                    addLog(`[GEOSPATIAL] ${region} in stable state.`);
                } else {
                    conscStatus.style.color = 'var(--danger)';
                    conscDesc.textContent = "CRITICAL: Regional trust drift detected!";
                    addLog(`[WARNING] ${region} identifying COLLECTIVE ANOMALY!`);
                }

            } catch (err) {
                addLog(`CRITICAL: Connection failed for ${region}. (${err.message})`);
                console.error(err);
            }
        }

        // Initial global sync
        updateSignal();
    </script>
</body>

</html>
