
<!DOCTYPE html>
<html>
<head><title>MitoPulse v39</title></head>
<body>
<h1>MitoPulse v39 FINAL</h1>

<button onclick="tab('exec')">Executive</button>
<button onclick="tab('live')">Live</button>
<button onclick="tab('alerts')">Alerts</button>

<div id="exec">
<h2>Mode</h2>
<button onclick="setMode('demo')">Demo</button>
<button onclick="setMode('client')">Client</button>
<pre id="mode"></pre>
</div>

<div id="live" style="display:none">
<h2>Live Data</h2>
<button onclick="loadLive()">Load</button>
<pre id="liveOut"></pre>
</div>

<div id="alerts" style="display:none">
<h2>Create Alert</h2>
<input id="e" placeholder="entity"/>
<input id="r" placeholder="risk"/>
<button onclick="send()">Send</button>
<pre id="out"></pre>
</div>

<script>
function tab(id){
 document.getElementById('exec').style.display='none';
 document.getElementById('live').style.display='none';
 document.getElementById('alerts').style.display='none';
 document.getElementById(id).style.display='block';
}

async function setMode(m){
 await fetch('/mode?mode='+m,{method:'POST'});
 loadMode();
}

async function loadMode(){
 let j=await fetch('/mode');
 document.getElementById('mode').textContent=await j.text();
}

async function loadLive(){
 let j=await fetch('/live');
 document.getElementById('liveOut').textContent=JSON.stringify(await j.json(),null,2);
}

async function send(){
 let e=document.getElementById('e').value;
 let r=document.getElementById('r').value;
 await fetch('/alert?entity='+e+'&risk='+r,{method:'POST'});
 load();
}

async function load(){
 let j=await fetch('/reports');
 document.getElementById('out').textContent=JSON.stringify(await j.json(),null,2);
}

load(); loadMode();
</script>
</body>
</html>
