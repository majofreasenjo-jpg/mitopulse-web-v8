openapi: 3.1.0
info:
  title: MitoPulse Gateway API
  version: 2.0.0
paths:
  /health:
    get:
      summary: Health
      responses:
        '200': {description: OK}
  /v2/presence/event:
    post:
      summary: Presence event
      parameters:
        - in: header
          name: X-Tenant-Id
          schema: {type: string}
        - in: header
          name: Idempotency-Key
          schema: {type: string}
      responses:
        '200': {description: OK}
