services:

  gateway:
    build: ../../services/gateway
    ports: ["8080:8080"]
    depends_on:
      - identity_engine
      - auth_service
      - postgres
      - redis
      - nats

  identity_engine:
    build: ../../services/identity_engine
    ports: ["8081:8080"]

  trust_graph:
    build: ../../services/trust_graph
    ports: ["8082:8080"]

  continuity_service:
    build: ../../services/continuity_service
    ports: ["8083:8080"]

  policy_engine:
    build: ../../services/policy_engine
    ports: ["8084:8080"]

  dashboard:
    build: ../../services/dashboard
    ports: ["8085:8080"]

  audit_ledger:
    build: ../../services/audit_ledger
    ports: ["8086:8080"]

  recovery_service:
    build: ../../services/recovery_service
    ports: ["8087:8080"]

  billing_meter:
    build: ../../services/billing_meter
    ports: ["8088:8080"]

  auth_service:
    build: ../../services/auth_service
    ports: ["8089:8080"]

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: mitopulse
      POSTGRES_PASSWORD: mitopulse
      POSTGRES_DB: mitopulse
    ports: ["5432:5432"]

  redis:
    image: redis:7
    ports: ["6379:6379"]

  nats:
    image: nats:2
    ports: ["4222:4222"]
