apiVersion: apps/v1
kind: Deployment
metadata:
  name: mitopulse-gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app: mitopulse-gateway
  template:
    metadata:
      labels:
        app: mitopulse-gateway
    spec:
      containers:
        - name: gateway
          image: mitopulse/gateway:latest
          ports:
            - containerPort: 8080
