services:
  backend:
    build: ./backend
    ports: ["8000:8000"]
    command: ["uvicorn","main:app","--host","0.0.0.0","--port","8000"]

  webapp:
    build: ./webapp
    ports: ["5176:5176"]
    environment:
      - VITE_BACKEND_DEFAULT=http://127.0.0.1:8000
    command: ["npm","run","dev","--","--host","0.0.0.0","--port","5176"]
    depends_on: [backend]

