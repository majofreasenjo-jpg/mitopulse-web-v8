<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
<title>MitoPulse Verify PWA</title>
<style>
body{font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Helvetica,Arial,sans-serif;background:#050a15;color:#fff;margin:0;display:flex;justify-content:center;align-items:center;height:100vh;overflow:hidden}
.app-frame{background:#0a1326;width:100%;max-width:400px;height:100%;max-height:800px;border-radius:24px;box-shadow:0 10px 30px rgba(0,0,0,0.5);display:flex;flex-direction:column;position:relative;border:1px solid #1a2a47}
.header{padding:20px;text-align:center;border-bottom:1px solid #1a2a47}
.content{padding:24px;flex:1;display:flex;flex-direction:column;align-items:center}
.pulse-ring{width:120px;height:120px;border-radius:50%;border:4px solid #284368;margin:30px 0;display:flex;justify-content:center;align-items:center;position:relative}
.pulse-ring::before{content:'';position:absolute;top:-10px;left:-10px;right:-10px;bottom:-10px;border-radius:50%;border:2px solid #ff4444;opacity:0}
.pulse-ring.danger::before{animation:pulse 2s infinite}
@keyframes pulse{0%{transform:scale(0.95);opacity:1}100%{transform:scale(1.2);opacity:0}}
.score{font-size:36px;font-weight:bold;color:#fff}
.label{font-size:14px;color:#8a9bb5;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
.details{background:#101a30;padding:16px;border-radius:12px;width:100%;box-sizing:border-box;margin-bottom:24px;border:1px solid #1a2a47}
.row{display:flex;justify-content:space-between;margin-bottom:12px;font-size:15px}
.row:last-child{margin-bottom:0}
.alert-box{background:rgba(255,68,68,0.1);border:1px solid #ff4444;padding:16px;border-radius:12px;color:#ff4444;text-align:center;font-size:14px;display:none;width:100%;box-sizing:border-box}
.btn{background:#0b1220;color:#fff;border:1px solid #284368;padding:16px;border-radius:12px;font-size:16px;font-weight:600;cursor:pointer;width:100%;margin-bottom:12px;transition:all 0.2s}
.btn.primary{background:#284368;border-color:#3a5888}
.btn:active{transform:scale(0.98)}
.scan-line{width:100%;height:2px;background:#44bb44;position:absolute;top:0;left:0;box-shadow:0 0 10px #44bb44;animation:scan 2s linear infinite;display:none}
@keyframes scan{0%{top:0}100%{top:100%}}
</style>
</head>
<body>
<div class="app-frame">
  <div class="scan-line" id="scanner"></div>
  <div class="header">
    <h2 style="margin:0;font-size:18px">System Verification</h2>
  </div>
  <div class="content">
    <div class="label">Relational Pulse Challenge</div>
    <div class="pulse-ring" id="ring">
      <div class="score" id="score">--</div>
    </div>
    
    <div class="details">
      <div class="row"><span style="color:#8a9bb5">Sender</span><span>Alex (You)</span></div>
      <div class="row"><span style="color:#8a9bb5">Receiver</span><span>Marco_Crypto99</span></div>
      <div class="row"><span style="color:#8a9bb5">Amount</span><span>$4,500.00</span></div>
    </div>
    
    <div class="alert-box" id="alertBox">
      ⚠️ <b>Shadow Coordination Detected</b><br><br>The receiver has hidden relational edges to a known scam ring. Immune Defense activated.
    </div>

    <div style="flex:1"></div>
    <button class="btn primary" onclick="startScan()" id="btnScan">Verify Relational DNA</button>
    <button class="btn" onclick="javascript:window.close()">Cancel Transfer</button>
  </div>
</div>

<script>
function startScan() {
  document.getElementById('btnScan').disabled = true;
  document.getElementById('btnScan').textContent = "Scanning...";
  document.getElementById('scanner').style.display = 'block';
  
  // Fake calculation delay
  let score = 0;
  let interval = setInterval(() => {
    score += Math.floor(Math.random() * 15);
    if(score > 90) score = 91;
    document.getElementById('score').textContent = score;
    
    // Risk threshold crossed
    if(score >= 80) {
      document.getElementById('ring').style.borderColor = '#ffaa00';
    }
    
    if (score >= 91) {
      clearInterval(interval);
      document.getElementById('scanner').style.display = 'none';
      document.getElementById('ring').style.borderColor = '#ff4444';
      document.getElementById('ring').classList.add('danger');
      document.getElementById('score').style.color = '#ff4444';
      document.getElementById('btnScan').textContent = "Transaction Blocked";
      document.getElementById('btnScan').style.opacity = '0.5';
      document.getElementById('alertBox').style.display = 'block';
    }
  }, 150);
}
</script>
</body>
</html>
