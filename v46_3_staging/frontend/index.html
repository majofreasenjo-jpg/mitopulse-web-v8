<!doctype html>
<html>
<head>
  <meta charset="utf-8"/>
  <title>MitoPulse v46.3 Master Dashboard</title>
  <style>
    body{margin:0;background:linear-gradient(180deg,#07111f,#0d1a2f);color:#eef4ff;font-family:Arial,sans-serif}
    .wrap{max-width:1500px;margin:0 auto;padding:18px}
    .tabs,.toolbar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
    .btn{background:#10203a;border:1px solid #34517f;color:#dbe8ff;border-radius:10px;padding:10px 12px;cursor:pointer}
    .btn.active{background:#1b3b68}
    .tab{display:none}.tab.active{display:block}
    .card{background:linear-gradient(180deg,#101d34,#0a1425);border:1px solid #223454;border-radius:14px;padding:14px;margin-bottom:12px}
    .grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
    .kpi{background:#10213c;border:1px solid #284067;border-radius:12px;padding:12px}
    .label{font-size:12px;color:#9bb0d1}.value{font-size:26px;font-weight:800;margin-top:6px}
    pre{background:#08111f;border:1px solid #1d2e4d;color:#d6e4ff;border-radius:12px;padding:12px;overflow:auto;max-height:340px}
    svg{width:100%;height:560px;background:#0b1320;border:1px solid #1f2a44;border-radius:12px}
    input{background:#10203a;border:1px solid #34517f;color:#dbe8ff;border-radius:10px;padding:10px 12px}
  </style>
</head>
<body>
<div class="wrap">
  <h1>MitoPulse v46.3 — Master Dashboard Integrated</h1>
  <div class="tabs">
    <button class="btn active" onclick="showTab('exec', this)">Executive</button>
    <button class="btn" onclick="showTab('graph', this)">Graph Live</button>
    <button class="btn" onclick="showTab('forecast', this)">Forecast</button>
    <button class="btn" onclick="showTab('brain', this)">System Brain</button>
    <button class="btn" onclick="showTab('ai', this)">AI Layer</button>
    <button class="btn" onclick="showTab('storm', this)">Invisible Storm</button>
    <button class="btn" onclick="showTab('actions', this)">Alerts & Actions</button>
    <button class="btn" onclick="showTab('verify', this)">MitoPulse Verify</button>
  </div>

  <div id="exec" class="tab active">
    <div class="card">
      <div class="toolbar"><button class="btn" onclick="loadExecutive()">Refresh</button></div>
      <div class="grid">
        <div class="kpi"><div class="label">GSI</div><div class="value" id="gsi">-</div></div>
        <div class="kpi"><div class="label">NHI</div><div class="value" id="nhi">-</div></div>
        <div class="kpi"><div class="label">TPI</div><div class="value" id="tpi">-</div></div>
        <div class="kpi"><div class="label">SCR</div><div class="value" id="scr">-</div></div>
      </div>
      <pre id="execOut">Sin ejecutar.</pre>
    </div>
  </div>

  <div id="graph" class="tab"><div class="card"><button class="btn" onclick="loadGraph()">Load Live Graph</button><svg id="graphSvg"></svg><pre id="graphOut">Sin ejecutar.</pre></div></div>
  <div id="forecast" class="tab"><div class="card"><div class="toolbar"><button class="btn" onclick="loadForecast('short')">Short</button><button class="btn" onclick="loadForecast('medium')">Medium</button><button class="btn" onclick="loadForecast('long')">Long</button></div><pre id="forecastOut">Sin ejecutar.</pre></div></div>
  <div id="brain" class="tab"><div class="card"><button class="btn" onclick="loadBrain()">Load Brain</button><pre id="brainOut">Sin ejecutar.</pre></div></div>
  <div id="ai" class="tab"><div class="card"><button class="btn" onclick="loadAI()">Load AI</button><pre id="aiOut">Sin ejecutar.</pre></div></div>
  <div id="storm" class="tab"><div class="card"><div class="toolbar"><button class="btn" onclick="loadStorm()">Load Demo</button><button class="btn" onclick="playStorm()">Play</button><button class="btn" onclick="pauseStorm()">Pause</button><input id="stormRange" type="range" min="1" max="20" value="1" oninput="renderStormStep(parseInt(this.value))" style="width:320px"/></div><svg id="stormSvg"></svg><pre id="stormOut">Sin ejecutar.</pre></div></div>
  <div id="actions" class="tab"><div class="card"><div class="toolbar"><input id="entityId" placeholder="entity id"/><input id="actionName" placeholder="action"/><button class="btn" onclick="sendAction()">Send Action</button></div><pre id="actionOut">Sin ejecutar.</pre></div></div>
  <div id="verify" class="tab"><div class="card"><button class="btn" onclick="loadVerify()">Load Verify</button><pre id="verifyOut">Sin ejecutar.</pre></div></div>
</div>

<script>
let waveTimer=null, stormPayload=null, stormTimer=null;
function showTab(id, btn){
 document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
 document.querySelectorAll('.btn').forEach(x=>x.classList.remove('active'));
 document.getElementById(id).classList.add('active'); btn.classList.add('active');
}
function roleColor(role){ if(role==='trigger') return '#ef476f'; if(role==='hidden') return '#7b61ff'; if(role==='wave') return '#00bbf9'; return '#8ecae6'; }
function drawGraph(svgId, graph){
 const svg=document.getElementById(svgId); svg.innerHTML='';
 if(!graph||!graph.nodes) return;
 (graph.risk_field||[]).forEach(p=>{const h=document.createElementNS('http://www.w3.org/2000/svg','circle'); h.setAttribute('cx',p.x); h.setAttribute('cy',p.y); h.setAttribute('r',32); h.setAttribute('fill','#ef476f'); h.setAttribute('opacity',Math.min(0.16,p.intensity)); svg.appendChild(h);});
 (graph.links||[]).forEach(l=>{const s=graph.nodes.find(n=>n.id===l.source), t=graph.nodes.find(n=>n.id===l.target); if(!s||!t)return; const line=document.createElementNS('http://www.w3.org/2000/svg','line'); line.setAttribute('x1',s.x); line.setAttribute('y1',s.y); line.setAttribute('x2',t.x); line.setAttribute('y2',t.y); line.setAttribute('stroke','#34517f'); line.setAttribute('stroke-width',2); line.setAttribute('opacity',0.75); svg.appendChild(line);});
 (graph.wave_fronts||[]).forEach(w=>{for(let i=1;i<=3;i++){const c=document.createElementNS('http://www.w3.org/2000/svg','circle'); c.setAttribute('cx',w.x); c.setAttribute('cy',w.y); c.setAttribute('r',10+i*14); c.setAttribute('fill','none'); c.setAttribute('stroke','#4cc9f0'); c.setAttribute('stroke-opacity',Math.max(0.06,0.24-i*0.05)); c.setAttribute('stroke-width',4); c.setAttribute('class',svgId+'-wave'); svg.appendChild(c);}});
 graph.nodes.forEach(n=>{const c=document.createElementNS('http://www.w3.org/2000/svg','circle'); c.setAttribute('cx',n.x); c.setAttribute('cy',n.y); c.setAttribute('r',14+Math.min(12,n.score*12)); c.setAttribute('fill',roleColor(n.role)); svg.appendChild(c); const tx=document.createElementNS('http://www.w3.org/2000/svg','text'); tx.setAttribute('x',n.x); tx.setAttribute('y',n.y+4); tx.setAttribute('text-anchor','middle'); tx.setAttribute('fill','#ffffff'); tx.setAttribute('font-size','10'); tx.textContent=n.label; svg.appendChild(tx);});
 if(waveTimer) clearInterval(waveTimer); let tick=0;
 waveTimer=setInterval(()=>{svg.querySelectorAll('.'+svgId+'-wave').forEach((ring, idx)=>{const base=14+(idx%3)*14; ring.setAttribute('r', String(base + (tick % 12)));}); tick++;},160);
}
async function loadExecutive(){ const j=await (await fetch('/api/executive')).json(); document.getElementById('gsi').textContent=j.GSI; document.getElementById('nhi').textContent=j.NHI; document.getElementById('tpi').textContent=j.TPI; document.getElementById('scr').textContent=j.SCR; document.getElementById('execOut').textContent=JSON.stringify(j,null,2);}
async function loadGraph(){ const j=await (await fetch('/api/live-graph')).json(); drawGraph('graphSvg', j); document.getElementById('graphOut').textContent=JSON.stringify(j,null,2);}
async function loadForecast(h){ const j=await (await fetch('/api/forecast?horizon='+h)).json(); document.getElementById('forecastOut').textContent=JSON.stringify(j,null,2);}
async function loadBrain(){ const j=await (await fetch('/api/brain')).json(); document.getElementById('brainOut').textContent=JSON.stringify(j,null,2);}
async function loadAI(){ const j=await (await fetch('/api/ai')).json(); document.getElementById('aiOut').textContent=JSON.stringify(j,null,2);}
async function loadVerify(){ const j=await (await fetch('/api/verify')).json(); document.getElementById('verifyOut').textContent=JSON.stringify(j,null,2);}
async function loadStorm(){ stormPayload=await (await fetch('/api/demo/invisible-storm')).json(); document.getElementById('stormRange').max=stormPayload.steps.length; document.getElementById('stormRange').value=1; renderStormStep(1);}
function renderStormStep(step){ if(!stormPayload) return; const s=stormPayload.steps[step-1]; drawGraph('stormSvg', s.graph); document.getElementById('stormOut').textContent=JSON.stringify(s,null,2);}
function playStorm(){ if(!stormPayload) return; pauseStorm(); let idx=parseInt(document.getElementById('stormRange').value||'1',10); stormTimer=setInterval(()=>{ if(idx>stormPayload.steps.length){pauseStorm(); return;} document.getElementById('stormRange').value=idx; renderStormStep(idx); idx++; },520);}
function pauseStorm(){ if(stormTimer) clearInterval(stormTimer); }
async function sendAction(){ const entity=document.getElementById('entityId').value; const action=document.getElementById('actionName').value; if(!entity||!action)return; const j=await (await fetch('/api/action?entity_id='+encodeURIComponent(entity)+'&action='+encodeURIComponent(action), {method:'POST'})).json(); document.getElementById('actionOut').textContent=JSON.stringify(j,null,2);}
loadExecutive(); loadGraph();
</script>
</body>
</html>
