
<html>
<head>
<style>
  body { background: black; color: #0f0; font-family: monospace; padding: 20px; line-height: 1.5; }
  h1 { border-bottom: 1px solid #0f0; display: inline-block; padding-bottom: 5px; }
  .pulse { animation: blink 1s infinite; }
  @keyframes blink { 50% { opacity: 0; } }
  #log { white-space: pre-wrap; max-height: 80vh; overflow-y: auto; display: flex; flex-direction: column-reverse; }
  .block { color: #f55; }
  .restrict { color: #ff5; }
</style>
</head>
<body>
  <h1>MitoPulse v69 <span class="pulse">_</span></h1>
  <p>System Alive - Neural Link Established</p>
  <div id="log"></div>
  <script>
    const logEl = document.getElementById('log');
    
    async function pollEngine() {
      // Simulate random incoming risk signal every 2 seconds
      const signal = (Math.random()).toFixed(4);
      try {
        const response = await fetch('http://127.0.0.1:8000/evaluate?signal=' + signal, { method: 'POST' });
        if (response.ok) {
          const data = await response.json();
          const p = document.createElement('div');
          
          let colorClass = "";
          if (data.decision === "block") colorClass = "block";
          if (data.decision === "restrict") colorClass = "restrict";
          
          p.innerHTML = `[${new Date().toISOString()}] Signal: ${signal} => <b class="${colorClass}">[${data.decision.toUpperCase()}]</b><br>` +
                        `  ├─ Quorum Approved: ${data.federation_quorum.approved} (WaitScore: ${data.federation_quorum.weighted_score})<br>` +
                        `  ├─ Trust Confidence: ${data.trust_layer.confidence} (${data.trust_layer.reason})<br>` +
                        `  └─ Impact Map Nodes: ${Object.keys(data.propagation_impact).length} assets infected.<br><br>`;
          
          logEl.prepend(p);
        }
      } catch(e) {
        logEl.innerHTML = `[CONNECTION ERROR] ` + e.toString() + "<br>" + logEl.innerHTML;
      }
      setTimeout(pollEngine, 2000);
    }
    
    pollEngine();
  </script>
</body>
</html>
