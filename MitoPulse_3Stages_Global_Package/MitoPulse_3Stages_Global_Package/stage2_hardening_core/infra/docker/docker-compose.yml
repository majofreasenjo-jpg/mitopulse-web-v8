services:
  gateway:
    build: ../../services/gateway
    ports: ["8080:8080"]
  verify_api:
    build: ../../services/verify_api
    ports: ["8081:8081"]
  presence_engine:
    build: ../../services/presence_engine
    ports: ["8082:8082"]
  risk_engine:
    build: ../../services/risk_engine
    ports: ["8083:8083"]
  device_registry:
    build: ../../services/device_registry
    ports: ["8084:8084"]
  ledger_service:
    build: ../../services/ledger_service
    ports: ["8085:8085"]
  trust_graph:
    build: ../../services/trust_graph
    ports: ["8086:8086"]
  auth_service:
    build: ../../services/auth_service
    ports: ["8087:8087"]
  billing_meter:
    build: ../../services/billing_meter
    ports: ["8088:8088"]
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: mitopulse
      POSTGRES_PASSWORD: mitopulse
      POSTGRES_DB: mitopulse
    ports: ["5432:5432"]
  redis:
    image: redis:7
    ports: ["6379:6379"]
  nats:
    image: nats:2
    ports: ["4222:4222"]
