<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>MitoPulse App</title>
<link rel="manifest" href="/manifest.webmanifest"><meta name="theme-color" content="#0b0f14">
<style>body{font-family:system-ui;background:#0b0f14;color:#e6edf3;padding:20px}.card{background:#111827;border:1px solid #253043;border-radius:14px;padding:16px;max-width:700px;margin:auto}input,button{width:100%;box-sizing:border-box;margin:8px 0;padding:12px;border-radius:10px;border:1px solid #334155}input{background:#0f172a;color:#e6edf3}button{background:#2563eb;color:#fff}pre{white-space:pre-wrap;background:#0f172a;padding:12px;border-radius:10px}</style></head>
<body><div class="card"><h1>MitoPulse App</h1><p>PWA instalable.</p>
<input id="api" value="" placeholder="Base URL API"><input id="user" value="manuel"><input id="device" value="mobile-web"><input id="stability" type="number" step="0.01" value="0.82"><input id="human" type="number" step="0.01" value="0.91"><input id="risk" type="number" value="10">
<button onclick="sample()">Registrar muestra</button><button onclick="verify()">Verificar presencia</button><pre id="out">Esperando acción...</pre></div>
<script>if("serviceWorker" in navigator) navigator.serviceWorker.register("/service-worker.js");
function base(){return document.getElementById("api").value.trim() || window.location.origin;}
async function sample(){const r=await fetch(base()+"/v1/presence/event",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({user_id:user.value,device_id:device.value,stability:parseFloat(stability.value),human_conf:parseFloat(human.value),risk_signal:parseInt(risk.value,10)})});out.textContent=JSON.stringify(await r.json(),null,2);}
async function verify(){const r=await fetch(base()+"/v1/verify/presence",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({user_id:user.value,device_id:device.value,stability:parseFloat(stability.value),human_conf:parseFloat(human.value),risk_signal:parseInt(risk.value,10)})});out.textContent=JSON.stringify(await r.json(),null,2);}</script>
</body></html>
