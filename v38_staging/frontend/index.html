
<!DOCTYPE html>
<html>
<head>
<title>MitoPulse v38</title>
</head>
<body>
<h1>MitoPulse v38 Dual Mode System</h1>

<h2>Mode</h2>
<button onclick="setMode('demo')">Demo Mode</button>
<button onclick="setMode('client')">Client Mode</button>
<pre id="mode"></pre>

<h2>Create Alert</h2>
<input id="client" placeholder="client"/>
<input id="entity" placeholder="entity"/>
<input id="risk" placeholder="risk"/>
<button onclick="send()">Send</button>

<h2>Reports</h2>
<pre id="out"></pre>

<script>
async function setMode(m){
 await fetch(`/mode?mode=${m}`,{method:'POST'});
 loadMode();
}

async function loadMode(){
 let j=await fetch('/mode');
 document.getElementById('mode').textContent=JSON.stringify(await j.json(),null,2);
}

async function send(){
 let c=document.getElementById('client').value;
 let e=document.getElementById('entity').value;
 let r=document.getElementById('risk').value;
 await fetch(`/alert?client=${c}&entity=${e}&risk=${r}`,{method:'POST'});
 load();
}

async function load(){
 let j=await fetch('/reports');
 document.getElementById('out').textContent=JSON.stringify(await j.json(),null,2);
}

load();
loadMode();
</script>
</body>
</html>
