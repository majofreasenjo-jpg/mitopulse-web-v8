
<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>MitoPulse Network</title>
  <style>
    body { font-family: Arial, sans-serif; margin:24px; background:#0d1117; color:#e6edf3; }
    .row { display:flex; gap:18px; }
    .panel { flex:1; background:#161b22; border-radius:14px; padding:16px; }
    pre { white-space: pre-wrap; background:#0b1220; padding:12px; border-radius:10px; }
    a { color:#8dc4ff; }
  </style>
</head>
<body>
<h1>Network / Ecosystem</h1>
<p><a href="/">Dashboard</a> · <a href="/node">Node</a> · <a href="/simulator">Simulator</a></p>
<div class="row">
  <div class="panel">
    <h3>Ecosystem Map</h3>
    <pre id="ecosystem">Cargando...</pre>
  </div>
  <div class="panel">
    <h3>Spread Map</h3>
    <pre id="spread">Cargando...</pre>
  </div>
  <div class="panel">
    <h3>Guardian Algorithm</h3>
    <pre id="guardian">Cargando...</pre>
  </div>
</div>
<script>
async function load() {
  document.getElementById('ecosystem').textContent = JSON.stringify(await (await fetch('/api/ecosystem_map')).json(), null, 2);
  document.getElementById('spread').textContent = JSON.stringify(await (await fetch('/api/spread_map')).json(), null, 2);
  document.getElementById('guardian').textContent = JSON.stringify(await (await fetch('/api/guardian_algorithm')).json(), null, 2);
}
load();
</script>
</body>
</html>
