
<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>MitoPulse Simulator</title>
  <style>
    body { font-family: Arial, sans-serif; margin:24px; background:#0c1220; color:#e8eefb; }
    .card { background:#141d31; padding:16px; border-radius:14px; max-width:900px; }
    input, select, button { padding:8px; margin:6px 0; border-radius:10px; }
    pre { white-space: pre-wrap; background:#0e1728; padding:12px; border-radius:10px; }
    a { color:#8dc4ff; }
  </style>
</head>
<body>
<h1>Simulator / Audit Mode</h1>
<p><a href="/">Dashboard</a> · <a href="/network">Network</a> · <a href="/node">Node</a></p>

<div class="card">
  <label>Source Node</label>
  <input id="source" value="node_1">
  <label>Target Node</label>
  <input id="target" value="node_10">
  <label>Industry</label>
  <select id="industry">
    <option>banking</option>
    <option>marketplace</option>
    <option>crypto</option>
    <option>messaging</option>
  </select>
  <label>Amount Anomaly (0-1)</label>
  <input id="amount" type="number" step="0.1" value="0.9">
  <label>Routine Break (0-1)</label>
  <input id="routine" type="number" step="0.1" value="0.8">
  <br>
  <button onclick="runEval()">Run Evaluation</button>
  <pre id="out"></pre>
</div>

<script>
async function runEval() {
  const res = await fetch('/api/evaluate', {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({
      source_node_id: document.getElementById('source').value,
      target_node_id: document.getElementById('target').value,
      industry: document.getElementById('industry').value,
      amount_anomaly: parseFloat(document.getElementById('amount').value),
      routine_break: parseFloat(document.getElementById('routine').value)
    })
  });
  document.getElementById('out').textContent = JSON.stringify(await res.json(), null, 2);
}
</script>
</body>
</html>
