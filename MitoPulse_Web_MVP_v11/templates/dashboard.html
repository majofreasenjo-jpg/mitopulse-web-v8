
<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>MitoPulse v11</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 24px; background:#0c1220; color:#e8eefb; }
    .grid { display:grid; grid-template-columns: repeat(4, 1fr); gap:16px; margin-bottom:20px; }
    .card { background:#141d31; padding:16px; border-radius:14px; box-shadow: 0 6px 16px rgba(0,0,0,.2); }
    a { color:#8dc4ff; }
    table { width:100%; border-collapse: collapse; margin-top:12px; }
    td,th { border-bottom:1px solid #24304a; padding:8px; text-align:left; font-size:14px; }
    button { padding:8px 12px; border-radius:10px; border:none; cursor:pointer; }
    pre { white-space: pre-wrap; background:#0e1728; padding:12px; border-radius:10px; }
  </style>
</head>
<body>
  <h1>MitoPulse v11</h1>
  <p>Dashboard + Audit + Guardian Nodes + Spread Map.</p>
  <p><a href="/network">Network</a> · <a href="/node">Node</a> · <a href="/simulator">Simulator</a></p>

  <div class="grid" id="cards"></div>

  <div class="card">
    <h3>Última evaluación</h3>
    <pre id="latest">Cargando...</pre>
  </div>

  <div class="card">
    <h3>Nodos</h3>
    <table id="nodesTable"></table>
  </div>

  <div class="card">
    <h3>Clusters de fraude</h3>
    <pre id="clusters">Cargando...</pre>
  </div>

<script>
async function load() {
  const nodes = await (await fetch('/api/nodes')).json();
  const clusters = await (await fetch('/api/fraud_clusters')).json();
  const guardianAlgo = await (await fetch('/api/guardian_algorithm')).json();

  const guardians = nodes.filter(n => n.is_guardian).length;
  const quarantined = nodes.filter(n => n.status === 'quarantined').length;
  const highRisk = nodes.filter(n => n.status === 'high_risk').length;

  document.getElementById('cards').innerHTML = `
    <div class="card"><b>Nodos</b><div>${nodes.length}</div></div>
    <div class="card"><b>Guardianes</b><div>${guardians}</div></div>
    <div class="card"><b>High Risk</b><div>${highRisk}</div></div>
    <div class="card"><b>Quarantined</b><div>${quarantined}</div></div>
  `;

  document.getElementById('clusters').textContent = JSON.stringify(clusters, null, 2);

  const latest = await fetch('/api/evaluation/ev_1/audit');
  if (latest.ok) {
    document.getElementById('latest').textContent = JSON.stringify(await latest.json(), null, 2);
  } else {
    document.getElementById('latest').textContent = 'Sin evaluaciones aún. Usa el Simulator.';
  }

  const rows = ['<tr><th>Node</th><th>Status</th><th>Guardian</th><th>Mass</th><th>Trust</th><th>Exposure</th></tr>']
  for (const n of nodes) {
    rows.push(`<tr><td>${n.node_id}</td><td>${n.status}</td><td>${n.is_guardian}</td><td>${n.nodal_mass}</td><td>${n.trust_rank}</td><td>${n.fraud_exposure}</td></tr>`)
  }
  document.getElementById('nodesTable').innerHTML = rows.join('');
}
load();
</script>
</body>
</html>
