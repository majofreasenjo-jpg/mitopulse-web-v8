<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MitoPulse | Investment Command Center</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;400;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/d3@7.9.0/dist/d3.min.js"></script>
    <style>
        :root {
            --primary: #6366f1;
            --accent: #a855f7;
            --bg: #030712;
            --card: rgba(17, 24, 39, 0.7);
            --text: #f8fafc;
            --safe: #4ade80;
            --risk: #ef4444;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            overflow: hidden;
            display: grid;
            grid-template-areas:
                "header header header"
                "stats graph logs"
                "map graph logs";
            grid-template-columns: 350px 1fr 400px;
            grid-template-rows: 80px 1fr 1fr;
            gap: 1rem;
            padding: 1rem;
        }

        header {
            grid-area: header;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--card);
            backdrop-filter: blur(20px);
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 0 2rem;
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.5rem;
            letter-spacing: 5px;
            background: linear-gradient(to right, var(--primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .card {
            background: var(--card);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
        }

        .stats-area {
            grid-area: stats;
            gap: 1rem;
            display: flex;
            flex-direction: column;
        }

        .graph-area {
            grid-area: graph;
            position: relative;
            overflow: hidden;
        }

        .logs-area {
            grid-area: logs;
            overflow-y: auto;
        }

        .map-area {
            grid-area: map;
            height: 100%;
            border-radius: 20px;
            overflow: hidden;
        }

        .stat-box {
            text-align: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding-bottom: 1rem;
        }

        .stat-value {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--primary);
        }

        .stat-label {
            font-size: 0.7rem;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        #graph-container {
            width: 100%;
            height: 100%;
        }

        .log-entry {
            font-family: monospace;
            font-size: 0.75rem;
            padding: 0.8rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            animation: fadeIn 0.3s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateX(10px);
            }

            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .tag {
            padding: 2px 6px;
            border-radius: 4px;
            font-weight: bold;
            font-size: 0.6rem;
        }

        .tag-ok {
            background: rgba(74, 222, 128, 0.2);
            color: var(--safe);
        }

        .tag-reg {
            background: rgba(99, 102, 241, 0.2);
            color: var(--primary);
        }

        #map-container {
            width: 100%;
            height: 100%;
            background: #111;
        }

        .leaflet-tile {
            filter: brightness(0.6) invert(1) contrast(3) hue-rotate(200deg) saturate(0.3);
        }

        .badge-live {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--safe);
            font-size: 0.8rem;
            font-weight: bold;
        }

        .dot {
            width: 8px;
            height: 8px;
            background: var(--safe);
            border-radius: 50%;
            animation: blink 1s infinite;
        }

        @keyframes blink {

            0%,
            100% {
                opacity: 1;
                box-shadow: 0 0 10px var(--safe);
            }

            50% {
                opacity: 0.3;
            }
        }
    </style>
</head>

<body>

    <header>
        <h1>MITOPULSE CENTRAL</h1>
        <div class="badge-live">
            <div class="dot"></div>
            GENESIS SECTOR ACTIVE | LANDMARK 22.0
        </div>
    </header>

    <div class="stats-area">
        <div class="card stat-box">
            <div class="stat-label">Active Presence</div>
            <div id="metric-nodes" class="stat-value">0</div>
        </div>
        <div class="card stat-box">
            <div class="stat-label">Verified Pulses</div>
            <div id="metric-pulses" class="stat-value">0</div>
        </div>
        <div class="card stat-box" style="flex: 1;">
            <div class="stat-label">Network Entropy</div>
            <div id="metric-entropy" class="stat-value" style="color: var(--safe);">STABLE</div>
            <div id="entropy-desc" style="font-size: 0.7rem; color: #94a3b8; margin-top: 1rem;">COLLECTIVE CONSCIOUSNESS
                AT 99.4% COHERENCE</div>
        </div>
    </div>

    <div class="card graph-area">
        <div
            style="position: absolute; top: 1rem; left: 1rem; z-index: 10; font-family: 'Orbitron'; font-size: 0.75rem; color: var(--primary);">
            LIVING NETWORK TRUST GRAPH</div>
        <div id="graph-container"></div>
    </div>

    <div class="card map-area">
        <div id="map-container"></div>
    </div>

    <div class="card logs-area">
        <div style="font-family: 'Orbitron'; font-size: 0.75rem; color: var(--accent); margin-bottom: 1rem;">
            STRIPE-LEVEL IDENTITY LEDGER</div>
        <div id="audit-logs"></div>
    </div>

    <script>
        const API_BASE = "http://127.0.0.1:8000";

        // --- MAP SETUP ---
        const map = L.map('map-container', { attributionControl: false, zoomControl: false }).setView([20, 0], 2);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 18, noWrap: true }).addTo(map);

        const hotspots = [
            { name: "NYC Core", coords: [40.7128, -74.0060] },
            { name: "London Node", coords: [51.5074, -0.1278] },
            { name: "Tokyo Sync", coords: [35.6762, 139.6503] },
            { name: "Sydney Link", coords: [-33.8688, 151.2093] }
        ];

        hotspots.forEach(h => {
            L.circleMarker(h.coords, {
                radius: 6, fillColor: "#6366f1", color: "#fff", weight: 1, opacity: 1, fillOpacity: 0.8
            }).addTo(map).bindTooltip(h.name);
        });

        // --- GRAPH SETUP ---
        const svg = d3.select("#graph-container").append("svg").attr("width", "100%").attr("height", "100%");
        let simulation;

        function updateGraph(data) {
            const container = document.getElementById('graph-container');
            const width = container.clientWidth, height = container.clientHeight;

            svg.selectAll("*").remove();

            simulation = d3.forceSimulation(data.nodes)
                .force("link", d3.forceLink(data.links).id(d => d.id).distance(100))
                .force("charge", d3.forceManyBody().strength(-200))
                .force("center", d3.forceCenter(width / 2, height / 2));

            const link = svg.append("g").selectAll("line")
                .data(data.links).enter().append("line")
                .attr("stroke", d => d.type === 'continuity' ? "#4ade80" : "#6366f1")
                .attr("stroke-width", d => d.weight * 3)
                .attr("stroke-opacity", 0.6);

            const node = svg.append("g").selectAll("circle")
                .data(data.nodes).enter().append("circle")
                .attr("r", d => d.type === 'user' ? 8 : 5)
                .attr("fill", d => d.type === 'user' ? "#a855f7" : "#6366f1")
                .attr("stroke", "#fff").attr("stroke-width", 1);

            node.append("title").text(d => d.id);

            simulation.on("tick", () => {
                link.attr("x1", d => d.source.x).attr("y1", d => d.source.y)
                    .attr("x2", d => d.target.x).attr("y2", d => d.target.y);
                node.attr("cx", d => d.x).attr("cy", d => d.y);
            });
        }

        // --- DATA SYNC ---
        async function syncData() {
            try {
                // Graph & Metrics
                const gRes = await fetch(`${API_BASE}/v22/graph/snapshot`);
                if (gRes.ok) {
                    const gData = await gRes.json();
                    updateGraph(gData);
                    document.getElementById('metric-nodes').textContent = gData.metrics.total_nodes;
                    document.getElementById('metric-pulses').textContent = gData.metrics.total_pulses;
                }

                // Audit Logs
                const aRes = await fetch(`${API_BASE}/v22/audit/latest`);
                if (aRes.ok) {
                    const aData = await aRes.json();
                    const logEl = document.getElementById('audit-logs');
                    logEl.innerHTML = "";
                    aData.rows.forEach(r => {
                        const div = document.createElement('div');
                        div.className = 'log-entry';
                        const tagClass = r.action === 'REGISTER' ? 'tag-reg' : 'tag-ok';
                        div.innerHTML = `<span class="tag ${tagClass}">${r.action}</span> <span style="color:#94a3b8">${new Date(r.ts * 1000).toLocaleTimeString()}</span> <br> <span style="font-size:0.7rem">${r.details}</span>`;
                        logEl.appendChild(div);
                    });
                }
            } catch (err) {
                console.error("Sync error:", err);
            }
        }

        setInterval(syncData, 3000);
        syncData();
    </script>
</body>

</html>
