<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MitoPulse Mobile | Trusted Identity</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;400;600&display=swap"
        rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/tweetnacl@1.0.3/nacl.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tweetnacl-util@0.15.1/nacl-util.min.js"></script>
    <style>
        :root {
            --primary: #6366f1;
            --accent: #a855f7;
            --bg: #070b14;
            --card: rgba(15, 23, 42, 0.8);
            --text: #f8fafc;
            --safe: #4ade80;
            --risk: #ef4444;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .header {
            padding: 2rem 1.5rem;
            text-align: center;
            background: linear-gradient(to bottom, rgba(99, 102, 241, 0.1), transparent);
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.25rem;
            letter-spacing: 2px;
            margin: 0;
            color: var(--primary);
        }

        .status-orb {
            width: 120px;
            height: 120px;
            margin: 2rem auto;
            border-radius: 50%;
            background: radial-gradient(circle, var(--primary), transparent);
            box-shadow: 0 0 40px var(--primary);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            animation: pulse 4s infinite ease-in-out;
        }

        @keyframes pulse {

            0%,
            100% {
                transform: scale(1);
                opacity: 0.8;
                box-shadow: 0 0 20px var(--primary);
            }

            50% {
                transform: scale(1.05);
                opacity: 1;
                box-shadow: 0 0 50px var(--primary);
            }
        }

        .main-ui {
            flex: 1;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .card {
            background: var(--card);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 1.5rem;
            text-align: center;
        }

        .value {
            font-family: 'Orbitron', sans-serif;
            font-size: 2rem;
            font-weight: 700;
            margin: 0.5rem 0;
        }

        .label {
            color: #94a3b8;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn {
            font-family: 'Orbitron', sans-serif;
            width: 100%;
            padding: 1rem;
            border-radius: 12px;
            border: none;
            background: var(--primary);
            color: white;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            margin-top: auto;
        }

        .btn:active {
            transform: scale(0.98);
            filter: brightness(1.2);
        }

        .btn-outline {
            background: transparent;
            border: 1px solid var(--primary);
            color: var(--primary);
        }

        .log {
            font-family: monospace;
            font-size: 0.7rem;
            color: #4ade80;
            text-align: left;
            height: 100px;
            overflow-y: auto;
            padding: 0.5rem;
        }

        #setup-screen {
            position: fixed;
            inset: 0;
            z-index: 100;
            background: var(--bg);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            text-align: center;
            gap: 2rem;
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>

<body>

    <!-- SETUP SCREEN -->
    <div id="setup-screen">
        <h1 style="font-size: 2rem;">MITOPULSE</h1>
        <p style="color: #94a3b8;">Welcome to the future of decentralized identity. Let's anchor this device to the
            global consciousness network.</p>
        <button class="btn" onclick="initializeIdentity()">Start Anchor</button>
    </div>

    <!-- MAIN APP SCREEN -->
    <div class="header">
        <h1>STABILITY: ACTIVE</h1>
        <div id="node-id" style="font-size: 0.6rem; color: var(--primary); margin-top: 0.5rem; opacity: 0.6;">POLLING...
        </div>
    </div>

    <div class="main-ui">
        <div class="status-orb" id="orb">
            <div style="font-family: 'Orbitron'; font-size: 0.8rem;">PULSE</div>
        </div>

        <div class="card">
            <div class="label">Trust Identity Index</div>
            <div class="value" id="trust-idx">0.98</div>
            <div style="color: var(--safe); font-size: 0.8rem;">CRYPTO VERIFIED</div>
        </div>

        <div class="card" style="flex: 1; display: flex; flex-direction: column;">
            <div class="label">Identity Ledger Logs</div>
            <div class="log" id="log">
                [SYSTEM] Awaiting pulse...
            </div>
        </div>

        <div style="display: flex; gap: 1rem; margin-top: auto;">
            <button class="btn btn-outline" onclick="initICP()">Continuity (ICP)</button>
            <button class="btn" id="pulse-btn" onclick="sendManualPulse()">Force Pulse</button>
        </div>
    </div>

    <script>
        let keyPair = null;
        let userId = "demo_user_" + Math.floor(Math.random() * 1000);
        let deviceId = "mobile_" + Math.floor(Math.random() * 1000);
        const API_BASE = "http://127.0.0.1:8000";

        function addLog(msg) {
            const l = document.getElementById('log');
            const d = document.createElement('div');
            d.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
            l.prepend(d);
        }

        async function initializeIdentity() {
            // Generate Ed25519 Keypair
            keyPair = nacl.sign.keyPair();
            const pubKeyB64 = nacl.util.encodeBase64(keyPair.publicKey);

            addLog("Generating Ed25519 anchors...");

            try {
                const res = await fetch(`${API_BASE}/v22/device/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        user_id: userId,
                        device_id: deviceId,
                        pubkey_b64: pubKeyB64
                    })
                });

                if (res.ok) {
                    localStorage.setItem('mitopulse_identity', JSON.stringify({
                        userId, deviceId,
                        privateKey: nacl.util.encodeBase64(keyPair.secretKey),
                        publicKey: pubKeyB64
                    }));

                    document.getElementById('setup-screen').classList.add('hidden');
                    document.getElementById('node-id').textContent = `${userId}:${deviceId}`;
                    addLog("Device anchored successfully.");
                    startHeartbeat();
                } else {
                    alert("Anchor failed. Ensure backend is running.");
                }
            } catch (err) {
                alert("Connection error: " + err.message);
            }
        }

        async function sendPulse(stability = 0.95) {
            if (!keyPair) return;

            const packet = {
                ts: Math.floor(Date.now() / 1000),
                user_id: userId,
                device_id: deviceId,
                epoch: 1,
                stability: stability,
                human_conf: 0.99,
                risk: stability < 0.5 ? 85 : 0,
                region: "Global"
            };

            // Canonical Serialization (Simplified for demo)
            const msgBytes = nacl.util.decodeUTF8(JSON.stringify(packet, Object.keys(packet).sort()));
            const sig = nacl.sign.detached(msgBytes, keyPair.secretKey);

            packet.signature_b64 = nacl.util.encodeBase64(sig);

            try {
                const res = await fetch(`${API_BASE}/v22/identity/pulse`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(packet)
                });

                if (res.ok) {
                    const result = await res.json();
                    addLog(`Pulse verified: ${result.packet_hash.slice(0, 8)}`);
                    visualPulse();
                }
            } catch (err) {
                addLog("Pulse failed: " + err.message);
            }
        }

        function visualPulse() {
            const orb = document.getElementById('orb');
            orb.style.background = 'radial-gradient(circle, var(--safe), transparent)';
            orb.style.boxShadow = '0 0 60px var(--safe)';
            setTimeout(() => {
                orb.style.background = '';
                orb.style.boxShadow = '';
            }, 500);
        }

        function sendManualPulse() {
            sendPulse(0.98);
        }

        function initICP() {
            addLog("Transitioning to ICP Handoff Mode...");
            document.getElementById('trust-idx').textContent = "PENDING";
            // In a real demo this would show a QR code
            alert(`Ready for handoff. Token generated for user ${userId}`);
        }

        function startHeartbeat() {
            setInterval(() => sendPulse(0.9 + Math.random() * 0.1), 8000);
        }

        // Check for existing identity
        window.onload = () => {
            const saved = localStorage.getItem('mitopulse_identity');
            if (saved) {
                const data = JSON.parse(saved);
                userId = data.userId;
                deviceId = data.deviceId;
                keyPair = {
                    publicKey: nacl.util.decodeBase64(data.publicKey),
                    secretKey: nacl.util.decodeBase64(data.privateKey)
                };
                document.getElementById('setup-screen').classList.add('hidden');
                document.getElementById('node-id').textContent = `${userId}:${deviceId}`;
                addLog("Restored anchor from vault.");
                startHeartbeat();
            }
        };
    </script>
</body>

</html>
