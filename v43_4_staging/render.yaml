services:
  - type: web
    name: mitopulse-v43-4-enterprise
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: AUTH_ENABLED
        value: "true"
      - key: SANDBOX_ENABLED
        value: "true"
      - key: AUDIT_LOGGING
        value: "true"
