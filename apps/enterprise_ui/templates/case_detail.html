{% extends "base.html" %}
{% block content %}
<section class="hero"><h1>{{case.title}}</h1><p>Detalle de caso, explicabilidad y acción sugerida.</p></section>
<section class="grid">
  <div class="card"><div class="label">ID</div><div class="value small">{{case.id}}</div></div>
  <div class="card"><div class="label">Vertical</div><div class="value small">{{case.vertical}}</div></div>
  <div class="card"><div class="label">Severity</div><div class="value small">{{case.severity}}</div></div>
  <div class="card"><div class="label">Action</div><div class="value small">{{case.recommended_action}}</div></div>
</section>
<section class="card">
  <h3>Explainability</h3>
  <p>{{case.explanation}}</p>
</section>
{% endblock %}
