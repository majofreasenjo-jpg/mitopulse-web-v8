{% extends "base.html" %}
{% block content %}
<section class="hero">
  <h1>Cinematic Replay</h1>
  <p>Modo narrativo para presentar cómo una señal pequeña evoluciona a presión, validación, policy y acción.</p>
</section>

<section class="card">
  <div class="toolbar">
    <button class="btn" onclick="CR.play()">Play</button>
    <button class="btn" onclick="CR.pause()">Pause</button>
    <button class="btn" onclick="CR.reset()">Reset</button>
  </div>
  <canvas id="cinematicCanvas" width="1280" height="760"></canvas>
</section>
<script src="/static/js/cinematic_replay.js"></script>
{% endblock %}
