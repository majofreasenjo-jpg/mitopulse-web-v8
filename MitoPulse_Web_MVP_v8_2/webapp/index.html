<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>MitoPulse App v8.2</title><style>
body{font-family:Arial;background:#0f172a;color:#fff;margin:0}.wrap{max-width:940px;margin:auto;padding:20px}.card{background:#1e293b;border-radius:16px;padding:18px;margin-bottom:18px}button,input,select{padding:12px;border-radius:10px;border:none;margin:6px 0}button{background:#22c55e;color:#fff;cursor:pointer}.small{opacity:.84;font-size:14px}label{display:block;margin-top:8px}input[type=range]{width:100%}.two{display:grid;grid-template-columns:1fr 1fr;gap:14px}@media (max-width:700px){.two{grid-template-columns:1fr}}.list{background:#0b1220;padding:10px;border-radius:10px;max-height:240px;overflow:auto}
</style></head><body><div class="wrap">
<div class="card"><h1>MitoPulse App v8.2</h1><div id="live" class="small">Conectando...</div><div id="nodeInfo" class="small"></div></div>
<div class="two"><div class="card"><h2>Usuario</h2><select id="userSelect"></select><select id="targetSelect"><option value="">Sin target</option></select></div><div class="card"><h2>Escenario</h2><select id="scenario"><option value="phone_scam">phone_scam</option><option value="identity_spoof">identity_spoof</option><option value="sms_phish">sms_phish</option><option value="email_phish">email_phish</option><option value="legit_transfer">legit_transfer</option><option value="fair_payment">fair_payment</option></select></div></div>
<div class="card"><h2>Señales</h2><label>Urgencia <input id="urgency" type="range" min="0" max="1" step="0.1" value="0.2"></label><label>Riesgo dictado <input id="dictation" type="range" min="0" max="1" step="0.1" value="0.0"></label><label>Ruptura rutina <input id="routine" type="range" min="0" max="1" step="0.1" value="0.2"></label><label>Solapamiento social <input id="social" type="range" min="0" max="1" step="0.1" value="0.6"></label><label>Alineación temporal <input id="temporal" type="range" min="0" max="1" step="0.1" value="0.6"></label><label>Contexto coherente <input id="context" type="range" min="0" max="1" step="0.1" value="0.6"></label><label>Coherencia interacción <input id="coherence" type="range" min="0" max="1" step="0.1" value="0.6"></label><label>Anomalía red <input id="net" type="range" min="0" max="1" step="0.1" value="0.0"></label><label>Novedad transacción <input id="novelty" type="range" min="0" max="1" step="0.1" value="0.2"></label><label>Captura remota probable <input id="remote" type="range" min="0" max="1" step="0.1" value="0.0"></label></div>
<div class="card"><button onclick="submitEval()">Evaluar</button><button onclick="crossPulse()">Pulso cruzado</button><div id="result" class="small"></div></div>
</div>
<script>
function getPersistentNodeId(){let id=localStorage.getItem('mitopulse_node_id'); if(!id){id='node_'+Math.random().toString(16).slice(2,10); localStorage.setItem('mitopulse_node_id',id);} return id;}
const nodeId=getPersistentNodeId(); document.getElementById('nodeInfo').textContent='Node ID persistente: '+nodeId;
let clickCount=0,keyCount=0,moveCount=0,startedAt=Date.now(),eventTimes=[];document.addEventListener("click",()=>{clickCount++;eventTimes.push(Date.now())});document.addEventListener("mousemove",()=>{moveCount++;if(moveCount%8===0)eventTimes.push(Date.now())});document.addEventListener("keydown",()=>{keyCount++;eventTimes.push(Date.now())});
function entropy(ts){if(ts.length<3)return 0.2;const d=[];for(let i=1;i<ts.length;i++)d.push(ts[i]-ts[i-1]);const m=d.reduce((a,b)=>a+b,0)/d.length;const v=d.reduce((a,b)=>a+Math.pow(b-m,2),0)/d.length;return Math.min(1,v/50000)}
function hes(ts){if(ts.length<2)return 0.2;const d=[];for(let i=1;i<ts.length;i++)d.push(ts[i]-ts[i-1]);return Math.min(1,d.filter(x=>x>700).length/Math.max(1,d.length))}
async function registerNode(){await fetch('/api/register_node',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({node_id:nodeId,platform:'web'})});}
function payload(){return {user_id:userSelect.value,target_id:targetSelect.value||null,scenario:scenario.value,amount:100,started_at:startedAt,click_count:clickCount,key_count:keyCount,move_count:moveCount,interaction_entropy:entropy(eventTimes),hesitation:hes(eventTimes),urgency:parseFloat(urgency.value),dictation_risk:parseFloat(dictation.value),routine_break:parseFloat(routine.value),social_overlap:parseFloat(social.value),temporal_alignment:parseFloat(temporal.value),context_fit:parseFloat(context.value),interaction_coherence:parseFloat(coherence.value),network_anomaly:parseFloat(net.value),transaction_novelty:parseFloat(novelty.value),remote_capture_probability:parseFloat(remote.value)}}
async function loadUsers(){const r=await fetch('/api/users');const users=await r.json();userSelect.innerHTML='';targetSelect.innerHTML='<option value="">Sin target</option>';users.forEach(u=>{let a=document.createElement('option');a.value=u.id;a.textContent=u.name;userSelect.appendChild(a);let b=document.createElement('option');b.value=u.id;b.textContent=u.name;targetSelect.appendChild(b)});}
async function submitEval(){const r=await fetch('/api/evaluate',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload())});const d=await r.json();result.textContent=`${d.decision} | MPS ${d.mitopulse_score} | Trust ${d.relational_trust}`;}
async function crossPulse(){const nodes=await (await fetch('/api/nodes')).json();const other=nodes.find(n=>n.id!==nodeId); if(!other){result.textContent='No hay otro nodo'; return;} const r=await fetch('/api/crosspulse',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({node_a:nodeId,node_b:other.id,shared_context_score:80,temporal_delta_ms:30,source:'web_app'})}); const d=await r.json(); result.textContent=d.ok?`Cross pulse ${d.node_a} ↔ ${d.node_b}`:'Error';}
registerNode(); loadUsers(); live.textContent='Conectado';
</script></body></html>
