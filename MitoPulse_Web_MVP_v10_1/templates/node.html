<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Nodo MitoPulse</title>
<style>body{font-family:Arial;background:#000;color:#fff;margin:0}.wrap{max-width:760px;margin:auto;padding:24px}.status{text-align:center;font-size:32px;color:#6d6cff;letter-spacing:4px;margin-top:40px}.orb{width:280px;height:280px;border-radius:50%;margin:30px auto;background:radial-gradient(circle,#6d6cff 0%,#2d2d66 50%,#111 75%);display:flex;align-items:center;justify-content:center;font-size:38px;font-weight:bold;box-shadow:0 0 80px #4b4bcc}.card{background:rgba(30,41,59,.7);border-radius:24px;padding:20px;margin:20px 0}.muted{color:#94a3b8}.btn{display:block;width:100%;padding:18px;border-radius:18px;border:none;background:#6d6cff;color:#fff;font-size:20px;font-weight:bold}.mono{font-family:monospace;color:#10b981;white-space:pre-wrap}select{width:100%;padding:12px;border-radius:12px;border:none;margin:8px 0}</style></head><body><div class="wrap"><div class="status">STATUS: ACTIVE</div><div class="orb">CONNECTED</div><div class="card"><div class="muted">IDENTIDAD NODAL PERSISTENTE</div><h1 id="nodeId">node_----</h1><div class="mono" id="log">> Registrando nodo...</div><div class="mono" id="pulseInfo" style="margin-top:10px;">> Pulsos: 0 | Cross Pulses: 0</div><div class="mono" id="metaInfo" style="margin-top:10px;">> Próximo latido en 30s</div><label class="muted">Nodo para cross-pulse<select id="otherNode"><option value="">Cargando nodos...</option></select></label></div><button class="btn" onclick="emitPulse()">EMITIR LATIDO</button><button class="btn" style="margin-top:12px;background:#4f46e5" onclick="emitCrossPulse()">CONECTAR CON NODO</button></div><script>
function getPersistentNodeId(){let id=localStorage.getItem('mitopulse_node_id'); if(!id){id='node_'+Math.random().toString(16).slice(2,10); localStorage.setItem('mitopulse_node_id',id);} return id;}
const nodeId=getPersistentNodeId(); document.getElementById('nodeId').textContent=nodeId; let countdown=30;
async function registerNode(){const d=await fetch('/api/register_node',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({node_id:nodeId,platform:'mobile'})}).then(r=>r.json()); document.getElementById('log').textContent=`> Nodo persistente verificado
> status: ${d.status||'active'}`; await refreshStatus(); await loadNodes();}
async function loadNodes(){const nodes=await (await fetch('/api/nodes')).json(); const sel=document.getElementById('otherNode'); sel.innerHTML='<option value="">Selecciona nodo...</option>'; nodes.filter(n=>n.id!==nodeId).forEach(n=>{const o=document.createElement('option'); o.value=n.id; o.textContent=`${n.id} | ${n.platform} | pulsos ${n.pulse_count}`; sel.appendChild(o);});}
async function refreshStatus(){const r=await fetch(`/api/node_status/${nodeId}`); const d=await r.json(); if(d.error){document.getElementById('log').textContent='> Error de registro'; return;} document.getElementById('pulseInfo').textContent=`> Pulsos: ${d.pulse_count} | Cross Pulses: ${d.cross_pulse_count}`; document.getElementById('metaInfo').textContent=`> Último seen: ${d.last_seen_at} | Próximo latido en ${countdown}s`;}
async function emitPulse(){const d=await fetch('/api/pulse',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({node_id:nodeId,platform:'mobile'})}).then(r=>r.json()); countdown=30; document.getElementById('log').textContent=`> Latido emitido
> pulse_count: ${d.pulse_count}
> last_seen: ${d.last_seen_at}`; await refreshStatus();}
async function emitCrossPulse(){const other=document.getElementById('otherNode').value; if(!other){document.getElementById('log').textContent='> Selecciona un nodo para validar'; return;} const d=await fetch('/api/crosspulse',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({node_a:nodeId,node_b:other,shared_context_score:82,temporal_delta_ms:35,source:'mobile_node'})}).then(r=>r.json()); await refreshStatus(); document.getElementById('log').textContent=`> Cross pulse con ${other}
> score: ${d.shared_context_score}
> relación: ${d.relationship_weight_before||'n/a'} -> ${d.relationship_weight_after||'n/a'}`;}
registerNode(); setInterval(()=>{countdown=Math.max(0,countdown-1); refreshStatus();},1000); setInterval(()=>emitPulse(),30000);
</script></body></html>
