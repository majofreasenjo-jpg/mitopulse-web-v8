<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Mapa de red</title>
<style>
body{font-family:Arial;background:#0f172a;color:white;margin:0}.wrap{max-width:1280px;margin:auto;padding:24px}.card{background:#1e293b;border-radius:16px;padding:18px;margin-bottom:18px}.grid{display:grid;grid-template-columns:1.1fr .9fr;gap:18px}@media (max-width:980px){.grid{grid-template-columns:1fr}}svg{width:100%;height:600px;background:#0b1220;border-radius:12px}.list{background:#0b1220;border-radius:12px;padding:12px;max-height:580px;overflow:auto}.legend span{display:inline-block;margin-right:10px;font-size:12px}.mono{font-family:monospace;white-space:pre-wrap}
</style></head><body><div class="wrap">
<div class="card"><h1>Mapa de red + guardianes + nodos infecciosos</h1><p>Borde dorado = guardian. Verde = healthy. Amarillo = monitored. Naranjo = high risk. Rojo = quarantined.</p></div>
<div class="grid"><div class="card"><h2>Trust Graph</h2><svg id="graph"></svg></div><div class="card"><h2>Detalle de nodo / Threat feed</h2><div id="nodeDetail" class="list">Haz clic en un nodo para ver su ficha.</div><div id="feed" class="list" style="margin-top:14px">Cargando...</div></div></div>
</div>
<script>
const stateColors={healthy:'#22c55e',monitored:'#eab308',high_risk:'#f59e0b',quarantined:'#ef4444'}; let currentNodes=[];
async function renderGraph(){const [graph,nodesMeta]=await Promise.all([fetch('/api/graph').then(r=>r.json()), fetch('/api/nodes').then(r=>r.json())]); const meta=Object.fromEntries(nodesMeta.map(n=>[n.user_id,n])); const svg=document.getElementById('graph');const w=svg.clientWidth||960,h=600;svg.setAttribute('viewBox',`0 0 ${w} ${h}`);while(svg.firstChild)svg.removeChild(svg.firstChild);const cols=4;const gapX=(w-220)/Math.max(1,cols-1);currentNodes=graph.nodes.map((n,i)=>({...n,x:110+(i%cols)*gapX,y:110+Math.floor(i/cols)*120,nodeMeta:meta[n.id]||null}));const map=Object.fromEntries(currentNodes.map(n=>[n.id,n]));graph.links.forEach(l=>{const a=map[l.source],b=map[l.target];if(!a||!b)return;const line=document.createElementNS('http://www.w3.org/2000/svg','line');line.setAttribute('x1',a.x);line.setAttribute('y1',a.y);line.setAttribute('x2',b.x);line.setAttribute('y2',b.y);line.setAttribute('stroke','#475569');line.setAttribute('stroke-width',String(Math.max(1,l.weight/22)));svg.appendChild(line)});currentNodes.forEach(n=>{const c=document.createElementNS('http://www.w3.org/2000/svg','circle');const rr=Math.max(13,Math.min(38,n.mass/2));c.setAttribute('cx',n.x);c.setAttribute('cy',n.y);c.setAttribute('r',rr);c.setAttribute('fill',stateColors[n.state]||'#22c55e');c.setAttribute('stroke',n.guardian?'#facc15':'#fff');c.setAttribute('stroke-width',n.guardian?'4':'1');c.style.cursor='pointer'; c.addEventListener('click',()=>showNode(n)); svg.appendChild(c);const t=document.createElementNS('http://www.w3.org/2000/svg','text');t.setAttribute('x',n.x);t.setAttribute('y',n.y+4);t.setAttribute('text-anchor','middle');t.setAttribute('font-size','11');t.setAttribute('fill','#fff');t.textContent=n.label.slice(0,10);svg.appendChild(t);});}
function showNode(n){const m=n.nodeMeta||{}; document.getElementById('nodeDetail').innerHTML=`<div class="mono"><b>${n.label}</b> ${n.guardian?'⭐':''}
User ID: ${n.id}
Node ID: ${m.id||'n/a'}
Estado: ${n.state}
TrustRank: ${n.trust_rank}
Masa nodal: ${n.mass}
Pulsos: ${m.pulse_count||0}
Cross-pulses: ${m.cross_pulse_count||0}
Último seen: ${m.last_seen_at||'n/a'}
Plataforma: ${m.platform||'n/a'}</div>`;}
async function renderFeed(){const [crosses, threats]=await Promise.all([fetch('/api/cross_pulses').then(r=>r.json()), fetch('/api/threats').then(r=>r.json())]); const rows=[]; threats.slice(0,8).forEach(t=>rows.push(`<div><b>${t.name}</b> | FraudHunter ${t.fraud_hunter_score} | ${t.state} | ${t.scenario}</div>`)); crosses.slice(0,18).forEach(x=>rows.push(`<div>${x.node_a} ↔ ${x.node_b} | score ${x.shared_context_score} | Δt ${x.temporal_delta_ms}ms | ${x.source}</div>`)); document.getElementById('feed').innerHTML=rows.length?rows.join(''):'Sin eventos';}
renderGraph();renderFeed();
</script></body></html>
