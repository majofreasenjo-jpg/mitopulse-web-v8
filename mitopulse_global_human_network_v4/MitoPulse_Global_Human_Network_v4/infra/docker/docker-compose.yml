services:
  gateway:
    build: ../../services/gateway
    ports: ["8080:8080"]
    depends_on: [auth_service, region_router, billing_meter, postgres, redis, nats]

  identity_engine:
    build: ../../services/identity_engine
    ports: ["8081:8081"]

  trust_graph:
    build: ../../services/trust_graph
    ports: ["8082:8082"]

  continuity_service:
    build: ../../services/continuity_service
    ports: ["8083:8083"]

  policy_engine:
    build: ../../services/policy_engine
    ports: ["8084:8084"]

  dashboard:
    build: ../../services/dashboard
    ports: ["8085:8085"]
    depends_on: [trust_graph, audit_ledger, billing_meter, ledger_service]

  audit_ledger:
    build: ../../services/audit_ledger
    ports: ["8086:8086"]

  recovery_service:
    build: ../../services/recovery_service
    ports: ["8087:8087"]

  billing_meter:
    build: ../../services/billing_meter
    ports: ["8088:8088"]

  auth_service:
    build: ../../services/auth_service
    ports: ["8089:8089"]

  developer_portal:
    build: ../../services/developer_portal
    ports: ["8090:8090"]

  region_router:
    build: ../../services/region_router
    ports: ["8091:8091"]
    depends_on: [identity_engine, trust_graph, policy_engine, audit_ledger, ledger_service]

  ledger_service:
    build: ../../services/ledger_service
    ports: ["8092:8092"]

  event_worker:
    build: ../../services/event_worker
    ports: ["8093:8093"]

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: mitopulse
      POSTGRES_PASSWORD: mitopulse
      POSTGRES_DB: mitopulse
    ports: ["5432:5432"]

  redis:
    image: redis:7
    ports: ["6379:6379"]

  nats:
    image: nats:2
    ports: ["4222:4222"]
