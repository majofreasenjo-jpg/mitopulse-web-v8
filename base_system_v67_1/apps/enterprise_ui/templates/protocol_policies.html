{% extends "base.html" %}
{% block content %}
<section class="hero"><h1>Policy Registry</h1><p>Policies persistentes, activables y versionadas.</p></section>
<section class="card">
  <table><tr><th>id</th><th>name</th><th>condition</th><th>action</th><th>enabled</th><th>toggle</th></tr>
  {% for p in policies %}
  <tr>
    <td>{{p.policy_id}}</td><td>{{p.name}}</td><td>{{p.condition_text}}</td><td>{{p.action_text}}</td><td>{{p.enabled}}</td>
    <td>
      <form method="post" action="/protocol/policies/{{p.policy_id}}/toggle">
        <input type="hidden" name="enabled" value="{{0 if p.enabled else 1}}"/>
        <button class="btn" type="submit">{{'disable' if p.enabled else 'enable'}}</button>
      </form>
    </td>
  </tr>
  {% endfor %}
  </table>
</section>
<section class="card">
  <h3>Create Policy</h3>
  <form method="post" action="/protocol/policies">
    <input name="policy_id" value="POLICY_CUSTOM_1"/>
    <input name="name" value="Custom Policy"/>
    <input name="condition_text" value="scr >= 65"/>
    <input name="action_text" value="escalate"/>
    <input name="confidence_required" value="0.75"/>
    <input name="quorum_required" value="0.70"/>
    <input name="severity_band" value="custom"/>
    <input name="version" value="1"/>
    <input name="explanation" value="Custom UI policy"/>
    <button class="btn" type="submit">Create</button>
  </form>
</section>
{% endblock %}
