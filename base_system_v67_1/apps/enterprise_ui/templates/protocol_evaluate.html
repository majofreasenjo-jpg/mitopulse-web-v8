{% extends "base.html" %}
{% block content %}
<section class="hero"><h1>Evaluate Protocol</h1><p>Ejecuta una evaluación real del engine y persiste eventos, votos y snapshot.</p></section>
<section class="card">
  <button class="btn" onclick="runEval()">Run Demo Evaluation</button>
  <pre id="out"></pre>
</section>
<script>
function runEval(){
  fetch('/protocol/evaluate', {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({
      entity_id:'entity_ui_v54',
      entity_type:'wallet_cluster',
      evidence_score:0.92,
      trust_score:0.24,
      trust_velocity:-0.04,
      trust_volatility:0.20,
      load_dev:74,
      entropy_dev:50,
      coordination_signal:83,
      trust_break:62,
      structural_distortion:57,
      confidence:0.91,
      quorum_score:0.87,
      recovery_stability_score:0.56
    })
  }).then(r=>r.json()).then(j=>{
    document.getElementById('out').textContent = JSON.stringify(j, null, 2);
  });
}
</script>
{% endblock %}
