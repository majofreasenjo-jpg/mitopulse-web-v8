{% extends "base.html" %}
{% block content %}
<section class="hero"><h1>Case Spaces</h1><p>Espacios de investigación y operación sobre eventos/casos.</p></section>
<section class="card">
  <button class="btn" onclick="createCase()">Crear caso automático</button>
  <table>
    <tr><th>ID</th><th>Título</th><th>Vertical</th><th>Severity</th><th>Status</th><th>Action</th><th>Open</th></tr>
    {% for c in cases %}
    <tr>
      <td>{{c.id}}</td><td>{{c.title}}</td><td>{{c.vertical}}</td><td>{{c.severity}}</td><td>{{c.status}}</td><td>{{c.recommended_action}}</td>
      <td><a href="/case/{{c.id}}">abrir</a></td>
    </tr>
    {% endfor %}
  </table>
</section>
<script>
function createCase(){
  fetch('/api/cases', {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({
      title:'Generated Case',
      vertical:'banking',
      severity: Math.floor(Math.random()*40)+50,
      recommended_action:'monitor',
      explanation:'Generated from UI'
    })
  }).then(()=>location.reload());
}
</script>
{% endblock %}
