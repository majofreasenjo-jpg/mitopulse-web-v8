{% extends "base.html" %}
{% block content %}
<section class="hero"><h1>System Dynamics</h1><p>Resumen agregado por stage/risk state.</p></section>
<section class="card">
  <table><tr><th>stage</th><th>score</th><th>load</th><th>entropy</th></tr>
  {% for row in timeline %}
  <tr><td>{{row.stage}}</td><td>{{row.stage_scr}}</td><td>{{row.avg_load}}</td><td>{{row.avg_entropy}}</td></tr>
  {% endfor %}
  </table>
</section>
{% endblock %}
