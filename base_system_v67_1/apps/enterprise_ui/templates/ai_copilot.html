{% extends "base.html" %}
{% block content %}
<section class="hero">
  <h1>AI Copilot</h1>
  <p>Capa auxiliar, no núcleo. Resume, explica y recomienda sin reemplazar la lógica soberana del protocolo.</p>
</section>
<section class="grid">
  <div class="card">
    <button class="btn" onclick="runCopilot()">Run Copilot Example</button>
    <pre id="copilotOut"></pre>
  </div>
</section>
<script>
async function runCopilot(){
  const payload = {
    entity_id:'copilot_demo',
    entity_type:'wallet_cluster',
    evidence_score:0.88,
    trust_score:0.26,
    trust_velocity:-0.04,
    trust_volatility:0.19,
    load_dev:70,
    entropy_dev:48,
    coordination_signal:81,
    trust_break:60,
    structural_distortion:55,
    confidence:0.91,
    quorum_score:0.86,
    recovery_stability_score:0.52
  };
  const r = await fetch('/api/ai_copilot', {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify(payload)
  });
  const j = await r.json();
  document.getElementById('copilotOut').textContent = JSON.stringify(j, null, 2);
}
</script>
{% endblock %}
