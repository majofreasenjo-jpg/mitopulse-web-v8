{% extends "base.html" %}
{% block content %}
<section class="hero"><h1>Connectors Layer</h1><p>Registry demostrativo de acceso a datos enterprise y fuentes externas.</p></section>
<section class="card">
  <table>
    <tr><th>Name</th><th>Type</th><th>Status</th></tr>
    {% for c in connectors %}
    <tr><td>{{c.name}}</td><td>{{c.type}}</td><td>{{c.status}}</td></tr>
    {% endfor %}
  </table>
</section>
{% endblock %}
