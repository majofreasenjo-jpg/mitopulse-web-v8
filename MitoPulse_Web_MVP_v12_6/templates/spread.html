<!doctype html><html><head><meta charset="utf-8"><title>Fraud Spread</title>
<style>
body{font-family:Arial,sans-serif;background:#0c1220;color:#eef4ff;margin:24px}
.card{background:#141d31;padding:16px;border-radius:14px;margin-bottom:16px}
pre{background:#0f1728;padding:12px;border-radius:10px;white-space:pre-wrap}
a{color:#8dc4ff}
button,input,select{padding:8px 12px;border-radius:10px}
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
</style></head><body>
<h1>Fraud Spread Engine</h1>
<p><a href="/">Home</a></p>
<div class="card"><button onclick="recompute()">Recompute Spread</button></div>
<pre id="out">Loading...</pre>
<script>
async function load(){const r=await fetch('/api/spread-map'); document.getElementById('out').textContent=JSON.stringify(await r.json(),null,2);}
async function recompute(){await fetch('/api/recompute/spread',{method:'POST'}); load();}
load();
</script>
</body></html>
