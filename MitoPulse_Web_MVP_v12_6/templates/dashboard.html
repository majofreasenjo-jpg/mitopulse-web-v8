<!doctype html><html><head><meta charset="utf-8"><title>Dashboard</title>
<style>
body{font-family:Arial,sans-serif;background:#0c1220;color:#eef4ff;margin:24px}
.card{background:#141d31;padding:16px;border-radius:14px;margin-bottom:16px}
pre{background:#0f1728;padding:12px;border-radius:10px;white-space:pre-wrap}
a{color:#8dc4ff}
button,input,select{padding:8px 12px;border-radius:10px}
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
</style></head><body>
<h1>Executive Dashboard</h1>
<p><a href="/">Home</a></p>
<div class="grid" id="cards"></div>
<div class="card"><pre id="summary">Loading...</pre></div>
<script>
async function load(){const r=await fetch('/api/summary'); const j=await r.json();
document.getElementById('cards').innerHTML = `
<div class="card"><b>Nodes</b><div>${j.nodes}</div></div>
<div class="card"><b>Guardians</b><div>${j.guardians}</div></div>
<div class="card"><b>High Risk</b><div>${j.high_risk}</div></div>
<div class="card"><b>Quarantined</b><div>${j.quarantined}</div></div>`;
document.getElementById('summary').textContent = JSON.stringify(j,null,2);}
load();
</script>
</body></html>
