<!doctype html><html><head><meta charset="utf-8"><title>Mobile Audit</title>
<style>
body{font-family:Arial,sans-serif;background:#0c1220;color:#eef4ff;margin:24px}
.card{background:#141d31;padding:16px;border-radius:14px;margin-bottom:16px}
pre{background:#0f1728;padding:12px;border-radius:10px;white-space:pre-wrap}
a{color:#8dc4ff}
button,input,select{padding:8px 12px;border-radius:10px}
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
</style></head><body>
<h2>Audit Receipt</h2>
<div class="card"><button onclick="loadAudit()">Load Last Evaluation</button></div><pre id="out">No evaluation loaded.</pre><a href="/mobile">Back</a>
<script>
async function loadAudit(){const id=localStorage.getItem('mitopulse_last_eval'); if(!id){document.getElementById('out').textContent='No stored evaluation id.'; return;} const r=await fetch('/api/evaluation/'+id); document.getElementById('out').textContent=JSON.stringify(await r.json(),null,2);}
</script>
</body></html>
