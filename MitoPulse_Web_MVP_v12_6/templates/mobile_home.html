<!doctype html><html><head><meta charset="utf-8"><title>Mobile Home</title>
<style>
body{font-family:Arial,sans-serif;background:#0c1220;color:#eef4ff;margin:24px}
.card{background:#141d31;padding:16px;border-radius:14px;margin-bottom:16px}
pre{background:#0f1728;padding:12px;border-radius:10px;white-space:pre-wrap}
a{color:#8dc4ff}
button,input,select{padding:8px 12px;border-radius:10px}
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
</style></head><body>
<h2>Node Home</h2>
<div class="card">
  <div><b>Node ID:</b> <span id="nid"></span></div>
  <div><b>Status:</b> <span id="status"></span></div>
  <div><b>Guardian:</b> <span id="guardian"></span></div>
  <div><b>Guardian Score:</b> <span id="guardian_score"></span></div>
  <div><b>Fraud Exposure:</b> <span id="exposure"></span></div>
  <button onclick="pulse()">Emit Pulse</button>
</div>
<div class="card">
  <a href="/mobile/relay">Relay Handshake</a><br>
  <a href="/mobile/eval">Quick Evaluation</a><br>
  <a href="/mobile/audit">Audit Receipt</a><br>
  <a href="/">Back</a>
</div>
<pre id="out"></pre>
<script>
function getNodeId(){let n=localStorage.getItem('mitopulse_node_id'); if(!n){n='node_'+Math.random().toString(16).slice(2,10); localStorage.setItem('mitopulse_node_id',n)} return n}
const nodeId=getNodeId(); document.getElementById('nid').textContent=nodeId;
async function refresh(){const r=await fetch('/api/node/'+nodeId); const j=await r.json(); document.getElementById('status').textContent=j.status; document.getElementById('guardian').textContent=j.guardian; document.getElementById('guardian_score').textContent=j.guardian_score; document.getElementById('exposure').textContent=j.fraud_exposure;}
async function pulse(){const r=await fetch('/api/pulse',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({node_id:nodeId})}); document.getElementById('out').textContent=JSON.stringify(await r.json(),null,2); refresh();}
refresh();
</script>
</body></html>
