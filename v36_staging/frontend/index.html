
<!DOCTYPE html>
<html>
<head>
<title>MitoPulse v36</title>
</head>
<body>
<h1>MitoPulse v36 Unified System</h1>

<h2>Create Alert</h2>
<input id="entity" placeholder="entity"/>
<input id="risk" placeholder="risk"/>
<button onclick="send()">Send</button>

<h2>Reports</h2>
<pre id="out"></pre>

<script>
async function send(){
    let e=document.getElementById('entity').value;
    let r=document.getElementById('risk').value;
    await fetch(`/alert?entity=${e}&risk=${r}`,{method:'POST'});
    load();
}

async function load(){
    let j=await fetch('/reports');
    document.getElementById('out').textContent=JSON.stringify(await j.json(),null,2);
}

load();
</script>
</body>
</html>
