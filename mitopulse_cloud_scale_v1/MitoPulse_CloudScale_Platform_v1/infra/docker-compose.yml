services:
  gateway:
    build: ../services/gateway
    ports: ["8080:8080"]
    depends_on: [identity_engine, trust_graph, continuity_service, policy_engine, audit_ledger]

  identity_engine:
    build: ../services/identity_engine
    ports: ["8081:8081"]

  trust_graph:
    build: ../services/trust_graph
    ports: ["8082:8082"]

  continuity_service:
    build: ../services/continuity_service
    ports: ["8083:8083"]

  policy_engine:
    build: ../services/policy_engine
    ports: ["8084:8084"]

  dashboard:
    build: ../services/dashboard
    ports: ["8085:8085"]
    depends_on: [gateway, trust_graph, audit_ledger]

  audit_ledger:
    build: ../services/audit_ledger
    ports: ["8086:8086"]
